<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СВОЯ ИГРА</title>
    <style>
        body { background: #000520; color: white; font-family: sans-serif; margin: 20px; text-align: center; }
        #board { display: grid; gap: 10px; margin: 20px auto; max-width: 95vw; }
        .cell { background: #0000ff; border: 2px solid gold; padding: 20px; font-size: 32px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; min-height: 80px; }
        .category { background: #00008b; font-size: 18px; cursor: default; border-color: #4169e1; text-transform: uppercase; }
        .cell.used { background: #000b30 !important; color: #1a2a6c !important; border-color: #1a2a6c !important; pointer-events: none; }
        .score-board { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .team-badge { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px solid gold; min-width: 150px; }
        .score-val { font-size: 36px; font-weight: bold; color: gold; margin: 5px 0; }
        .btn-sm { background: gold; color: black; border: none; font-weight: bold; padding: 5px 10px; cursor: pointer; margin: 2px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; z-index: 2000; }
        #question-text { font-size: 36px; margin-bottom: 20px; max-width: 900px; }
        #answer-text { font-size: 28px; color: gold; margin-bottom: 20px; letter-spacing: 2px; }
        .menu-btn { background: gold; color: #000; padding: 10px 20px; font-size: 18px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .admin-section { display: flex; gap: 10px; margin-top: 25px; }
        .admin-btn { border: none; font-weight: bold; padding: 8px 12px; cursor: pointer; color: #fff; }
        .admin-btn.plus { background: #27ae60; }
        .admin-btn.minus { background: #c0392b; }
    </style>
</head>
<body>

    <h1>СВОЯ ИГРА</h1>

    <!-- ИГРОВОЕ ПОЛЕ -->
    <div id="board"></div>

    <!-- ТАБЛО ОЧКОВ -->
    <div class="score-board" id="score-board"></div>

    <!-- ОКНО ВОПРОСА -->
    <div id="overlay">
        <div id="question-text"></div>
        <div id="answer-text"></div>
        <div>
            <button id="letter-btn" class="menu-btn" style="background:#1e90ff; color:#fff;" onclick="revealNextLetter()">Открыть букву</button>
            <button id="show-btn" class="menu-btn" onclick="showAnswer()">Узнать ответ</button>
        </div>
        <div class="admin-section">
            <div>Команда 1:<br><button class="admin-btn plus" onclick="awardPoints(1)">+</button><button class="admin-btn minus" onclick="deductPoints(1)">-</button></div>
            <div>Команда 2:<br><button class="admin-btn plus" onclick="awardPoints(2)">+</button><button class="admin-btn minus" onclick="deductPoints(2)">-</button></div>
            <div>Команда 3:<br><button class="admin-btn plus" onclick="awardPoints(3)">+</button><button class="admin-btn minus" onclick="deductPoints(3)">-</button></div>
            <div>Команда 4:<br><button class="admin-btn plus" onclick="awardPoints(4)">+</button><button class="admin-btn minus" onclick="deductPoints(4)">-</button></div>
        </div>
        <button class="menu-btn" style="background:#333; color:#fff; margin-top:30px;" onclick="closeQuestion()">Закрыть вопрос</button>
    </div>

    <script>
        var gameData = [
            {
                cat: "БЬЮТИ И МОДА",
                qs: [
                    { p: 100, q: "Как называется популярная обувь на массивной подошве, получившая название в честь батончика?", a: "Сникеры" },
                    { p: 200, q: "Что такое хайлайтер и для чего его наносят на лицо?", a: "Хайлайтер" },
                    { p: 300, q: "Какой предмет гардероба, ставший культовым, придумала Коко Шанель в 1926 году?", a: "Платье" },
                    { p: 400, q: "Как называется легкий полупрозрачный крем, который одновременно увлажняет кожу и выравнивает тон (две буквы)?", a: "BB-крем" },
                    { p: 500, q: "Как называется стиль в одежде, имитирующий роскошный образ жизни старых европейских денег?", a: "Олд Мани" }
                ]
            },
            {
                cat: "МУЗЫКА И ТАНЦЫ",
                qs: [
                    { p: 100, q: "Как называется развлечение, когда люди собираются в баре и по очереди поют песни по тексту на экране?", a: "Караоке" },
                    { p: 200, q: "В каком парном латиноамериканском танце, партнерша делает плавные движения бедрами и волны телом?", a: "Бачата" },
                    { p: 300, q: "Какая певица установила мировой рекорд, собрав самый кассовый музыкальный тур в истории — The Eras Tour?", a: "Тейлор Свифт" },
                    { p: 400, q: "Как называется музыкальный беспроводной девайс, который часто берут с собой на пикник или пляж?", a: "Колонка" },
                    { p: 500, q: "Какая поп-дива исполнила легендарный хит «Single Ladies» и заставила весь мир повторять танец рук?", a: "Бейонсе" }
                ]
            },
            {
                cat: "ПУТЕШЕСТВИЯ И ОТДЫХ",
                qs: [
                    { p: 100, q: "Как называется популярная система обслуживания в отелях, когда еда и напитки включены в стоимость без ограничений?", a: "Все включено" },
                    { p: 200, q: "Какое французское слово означает дорожную сумку на колесиках или с ручкой для перевозки личных вещей?", a: "Чемодан" },
                    { p: 300, q: "В какой стране находится знаменитый курортный остров Бали, привлекающий миллионы туристов?", a: "Индонезия" },
                    { p: 400, q: "Как называется защитное средство, которое обязательно нужно наносить на кожу перед выходом на пляж, чтобы не обгореть?", a: "SPF-крем" },
                    { p: 500, q: "Какой город мира славится своими романтичными прогулками на гондолах по водным каналам?", a: "Венеция" }
                ]
            },
            {
                cat: "ЕДА И КУЛИНАРИЯ",
                qs: [
                    { p: 100, q: "Какой знаменитый итальянский десерт переводится как «вознеси меня вверх» из-за кофе и нежного мусса в составе?", a: "Тирамису" },
                    { p: 200, q: "Как называется популярный кофейный напиток, состоящий из эспрессо, большого количества молока и небольшого слоя пенки?", a: "Латте" },
                    { p: 300, q: "Какой изысканный зеленый японский чай в виде порошка взбивают венчиком и часто добавляют в десерты и латте?", a: "Матча" },
                    { p: 400, q: "Из какого фрукта (а точнее, маслянистой ягоды) делают знаменитый мексиканский соус гуакамоле?", a: "Авокадо" },
                    { p: 500, q: "Как называется французский воздушный пирог-тарт с основой из рубленого теста и нежной заливкой из яиц и сливок?", a: "Киш" }
                ]
            }
        ];

        var teams = [
            { name: "Команда 1", score: 0 },
            { name: "Команда 2", score: 0 },
            { name: "Команда 3", score: 0 },
            { name: "Команда 4", score: 0 }
        ];

        var used = new Set();
        var curPts = 0;
        var currentActiveCellId = null;
        var currentFullAnswer = "";
        var revealedLettersCount = 0;

        function buildBoard() {
            var board = document.getElementById('board');
            board.innerHTML = "";
            if (gameData.length === 0) return;
            
            var numQs = gameData[0].qs.length;
            board.style.gridTemplateColumns = "280px repeat(" + numQs + ", 1fr)";
            
            gameData.forEach(function(catObj, cIdx) {
                var catCell = document.createElement('div');
                catCell.className = "cell category";
                catCell.innerText = catObj.cat;
                board.appendChild(catCell);
                
                catObj.qs.forEach(function(qObj, qIdx) {
                    var cell = document.createElement('div');
                    cell.className = "cell";
                    var cellId = cIdx + "-" + qIdx;
                    cell.id = "cell-" + cellId;
                    cell.innerText = qObj.p;
                    
                    if (used.has(cellId)) {
                        cell.classList.add('used');
                    } else {
                        cell.onclick = function() { openQuestion(cellId, qObj.q, qObj.a, qObj.p); };
                    }
                    board.appendChild(cell);
                });
            });
        }

        function updateScores() {
            var sb = document.getElementById('score-board');
            sb.innerHTML = "";
            teams.forEach(function(t, idx) {
                var badge = document.createElement('div');
                badge.className = "team-badge";
                
                var nameDiv = document.createElement('div');
                nameDiv.innerText = t.name;
                badge.appendChild(nameDiv);
                
                var valDiv = document.createElement('div');
                valDiv.className = "score-val";
                valDiv.innerText = t.score;
                badge.appendChild(valDiv);
                
                var btnPlus = document.createElement('button');
                btnPlus.className = "btn-sm";
                btnPlus.innerText = "+100";
                btnPlus.onclick = function() { adjustScoreDirectly(idx, 100); };
                badge.appendChild(btnPlus);
                
                var btnMinus = document.createElement('button');
                btnMinus.className = "btn-sm";
                btnMinus.innerText = "-100";
                btnMinus.onclick = function() { adjustScoreDirectly(idx, -100); };
                badge.appendChild(btnMinus);
sb.appendChild(badge);
});
}
function adjustScoreDirectly(tIdx, val) {
teams[tIdx].score += val;
updateScores();
}
function openQuestion(cellId, qText, aText, points) {
currentActiveCellId = cellId;
curPts = points;
currentFullAnswer = aText;
revealedLettersCount = 0;
document.getElementById('question-text').innerText = qText;
renderMaskedAnswer();
document.getElementById('show-btn').style.display = "inline-block";
document.getElementById('letter-btn').style.display = "inline-block";
document.getElementById('overlay').style.display = "flex";
}
function renderMaskedAnswer() {
var masked = "";
var currentLetterIdx = 0;
for (var i = 0; i < currentFullAnswer.length; i++) {
var char = currentFullAnswer[i];
if (char === " " || char === "-") {
masked += char;
} else {
masked += (currentLetterIdx < revealedLettersCount) ? char : "*";
currentLetterIdx++;
}
}
document.getElementById('answer-text').innerText = "ОТВЕТ: " + masked;
}
function revealNextLetter() {
var totalLetters = currentFullAnswer.replace(/[\s-]/g, "").length;
if (revealedLettersCount < totalLetters) {
revealedLettersCount++;
renderMaskedAnswer();
}
if (revealedLettersCount >= totalLetters) {
document.getElementById('letter-btn').style.display = "none";
document.getElementById('show-btn').style.display = "none";
}
}
function showAnswer() {
document.getElementById('answer-text').innerText = "ОТВЕТ: " + currentFullAnswer;
document.getElementById('show-btn').style.display = "none";
document.getElementById('letter-btn').style.display = "none";
}
function awardPoints(teamNum) {
teams[teamNum - 1].score += curPts;
updateScores();
closeQuestion();
}
function deductPoints(teamNum) {
teams[teamNum - 1].score -= curPts;
updateScores();
}
function closeQuestion() {
if (currentActiveCellId) {
used.add(currentActiveCellId);
var cell = document.getElementById("cell-" + currentActiveCellId);
if (cell) {
cell.classList.add('used');
cell.onclick = null;
}
}
document.getElementById('overlay').style.display = "none";
}
buildBoard();
updateScores();
