<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СВОЯ ИГРА: PC ULTIMATE</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #000520; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .screen, #overlay { 
            background: radial-gradient(circle at center, #001a66 0%, #000520 100%);
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; 
        }

        .menu-btn { 
            background: gold; color: #000; padding: 12px 25px; font-size: 18px; font-weight: 800; 
            border: none; border-radius: 6px; cursor: pointer; margin: 8px; width: 100%; max-width: 320px;
            transition: 0.2s; text-transform: uppercase;
        }
        .menu-btn:hover { transform: scale(1.05); background: #fff; box-shadow: 0 0 20px gold; }

        /* ИГРОВОЕ ПОЛЕ */
        #game-screen { display: none; }
        #board-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; overflow: auto; }
        #board { display: grid; gap: 10px; padding: 20px; margin: auto; }
        
        .cell { 
            background: linear-gradient(145deg, #0000ff, #00008b); 
            border: 2px solid gold; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; font-size: 32px; min-width: 140px; min-height: 90px; padding: 10px;
        }
        .category { background: #00008b; font-size: 16px; cursor: default; border-color: #4169e1; text-transform: uppercase; width: 220px; text-align: center; }
        .cell.used { background: #000b30 !important; color: #1a2a6c !important; border-color: #1a2a6c !important; pointer-events: none; }

        /* ТАБЛО КОМАНД (Вертикальное: Имя сверху, Очки снизу) */
        .score-board { 
            display: flex; gap: 40px; justify-content: center; padding: 20px; 
            background: rgba(0,0,0,0.4); width: 100%; border-top: 3px solid gold; 
        }
        .team-badge { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .score-name { font-size: 18px; font-weight: bold; color: #fff; text-transform: uppercase; margin-bottom: 5px; opacity: 0.8; }
        .score-val { font-size: 50px; font-weight: 900; color: gold; line-height: 1; text-shadow: 0 0 15px rgba(255,215,0,0.5); }

        /* ОКНО ВОПРОСА */
        #question-text { font-size: 40px; text-align: center; margin-bottom: 30px; max-width: 1000px; line-height: 1.3; }
        #answer-text { font-size: 34px; color: gold; margin-bottom: 25px; display: none; font-weight: bold; border-top: 2px solid gold; padding-top: 15px; }

        /* РЕДАКТОР И НАСТРОЙКИ */
        .editor-container { background: white; color: black; padding: 25px; border-radius: 12px; width: 95%; max-width: 1100px; max-height: 85vh; overflow-y: auto; }
        .editor-row { display: grid; grid-template-columns: 90px 1fr 1fr; gap: 10px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    </style>
</head>
<body>

    <audio id="snd-intro" src="intro.mp3" loop></audio>
    <audio id="snd-think" src="think.mp3"></audio>
    <audio id="snd-correct" src="correct.mp3"></audio>

    <div id="start-overlay" class="screen" style="display:flex;">
        <h1 style="color:gold; font-size:70px; text-shadow: 0 0 30px gold;">СВОЯ ИГРА</h1>
        <button class="menu-btn" onclick="unlockAudio()">ВОЙТИ В ИГРУ</button>
    </div>

    <div id="menu-screen" class="screen">
        <button class="menu-btn" onclick="continueGame()" id="cont-btn" style="display:none">ПРОДОЛЖИТЬ</button>
        <button class="menu-btn" onclick="showSettings()">НАСТРОЙКИ ПОЛЯ И КОМАНД</button>
        <button class="menu-btn" onclick="showEditor()">РЕДАКТОР ВОПРОСОВ</button>
        <button class="menu-btn" onclick="startNewGame()" style="background:#27ae60; color:#fff;">НАЧАТЬ ТУР</button>
    </div>

    <div id="game-screen" class="screen">
        <button onclick="openMenu()" style="position:fixed; top:20px; right:20px; padding:10px 20px; background:gold; border:none; font-weight:bold; cursor:pointer; border-radius: 5px;">МЕНЮ</button>
        <div id="board-container">
            <div id="board"></div>
        </div>
        <div class="score-board" id="score-board"></div>
    </div>

    <div id="overlay">
        <div id="question-text"></div>
        <div id="answer-text"></div>
        <button id="show-btn" class="menu-btn" onclick="showAnswer()">ОТВЕТ</button>
        <div id="admin-controls" style="display:none; gap:12px; flex-wrap:wrap; justify-content:center;"></div>
        <button id="skip-btn" class="menu-btn" style="background:#333; color:#fff; margin-top:20px; display:none;" onclick="closeQuestion()">Никто не ответил</button>
    </div>

    <div id="settings-screen" class="screen">
        <div style="background:rgba(255,255,255,0.05); padding:30px; border-radius:15px; border:2px solid gold; text-align:center; min-width: 500px;">
            <h2 style="color:gold">ПАРАМЕТРЫ ИГРЫ</h2>
            <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 20px;">
                <div>Тем: <br><input type="number" id="cfg-cats" value="3" style="width:60px"></div>
                <div>Вопросов: <br><input type="number" id="cfg-qpc" value="5" style="width:60px"></div>
            </div>
            <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 20px;">
                <div>Старт очков: <br><input type="number" id="cfg-start-pts" value="100" style="width:80px"></div>
                <div>Шаг очков: <br><input type="number" id="cfg-step-pts" value="100" style="width:80px"></div>
            </div>
            <hr style="opacity:0.2">
            Количество команд: <input type="number" id="team-count" value="4" min="1" max="6" onchange="generateTeamInputs()" style="width:50px">
            <div id="teams-config-container" style="margin:15px 0;"></div>
            <button class="menu-btn" onclick="saveSettings()">СОХРАНИТЬ ВСЁ</button>
        </div>
    </div>

    <div id="editor-screen" class="screen">
        <div class="editor-container">
            <h2>Редактор (Очки | Вопрос | Ответ)</h2>
            <div id="editor-fields"></div>
            <button class="menu-btn" onclick="closeEditor()" style="background:#27ae60; color:#fff;">ГОТОВО</button>
        </div>
    </div>

    <script>
        let config = { cats: 3, qPerCat: 5, startPts: 100, stepPts: 100 };
        let gameData = [];
        let teams = [];
        let used = new Set();
        let curPts = 0;

        function unlockAudio() {
            document.getElementById('start-overlay').style.display='none';
            document.getElementById('menu-screen').style.display='flex';
            document.getElementById('snd-intro').play().catch(()=>{});
        }

        function generateEmptyData() {
            gameData = [];
            for(let r=0; r<config.cats; r++) {
                let row = { cat: "ТЕМА " + (r+1), qs: [] };
                for(let c=0; c<config.qPerCat; c++) { 
                    let points = config.startPts + (c * config.stepPts);
                    row.qs.push({ q: "Текст вопроса...", a: "Ответ", p: points }); 
                }
                gameData.push(row);
            }
        }

        function showEditor() {
            if(gameData.length === 0) generateEmptyData();
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'flex';
            let container = document.getElementById('editor-fields');
            container.innerHTML = "";
            gameData.forEach((cat, cIdx) => {
                let div = document.createElement('div');
                div.style.marginBottom = "25px";
                div.innerHTML = `<h3><input style="width:300px" value="${cat.cat}" onchange="gameData[${cIdx}].cat=this.value"></h3>`;
                cat.qs.forEach((q, qIdx) => {
                    div.innerHTML += `
                        <div class="editor-row">
                            <input type="number" value="${q.p}" onchange="gameData[${cIdx}].qs[${qIdx}].p=parseInt(this.value)">
                            <input value="${q.q}" onchange="gameData[${cIdx}].qs[${qIdx}].q=this.value">
                            <input value="${q.a}" onchange="gameData[${cIdx}].qs[${qIdx}].a=this.value">
                        </div>`;
                });
                container.appendChild(div);
            });
        }

        function showSettings() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('settings-screen').style.display = 'flex';
            generateTeamInputs();
        }

        function generateTeamInputs() {
            let count = document.getElementById('team-count').value;
            let container = document.getElementById('teams-config-container');
            container.innerHTML = "";
            for(let i=0; i<count; i++) {
                container.innerHTML += `<input type="text" id="tname-${i}" value="${teams[i]?.name || 'КОМАНДА '+(i+1)}" style="margin:5px; width:280px"><br>`;
            }
        }

        function saveSettings() {
            config.cats = parseInt(document.getElementById('cfg-cats').value);
            config.qPerCat = parseInt(document.getElementById('cfg-qpc').value);
            config.startPts = parseInt(document.getElementById('cfg-start-pts').value);
            config.stepPts = parseInt(document.getElementById('cfg-step-pts').value);
            let count = document.getElementById('team-count').value;
            teams = [];
            for(let i=0; i<count; i++) {
                teams.push({ name: document.getElementById('tname-'+i).value, score: 0 });
            }
            generateEmptyData();
            document.getElementById('settings-screen').style.display='none';
            document.getElementById('menu-screen').style.display='flex';
        }

        function startNewGame() {
            if(teams.length === 0) saveSettings();
            used.clear();
            document.getElementById('menu-screen').style.display='none';
            document.getElementById('game-screen').style.display='flex';
            renderBoard();
            updateScores();
        }

        function renderBoard() {
            let board = document.getElementById('board');
            board.style.gridTemplateColumns = `auto repeat(${config.qPerCat}, auto)`;
            board.innerHTML = "";
            gameData.forEach((cat, rIdx) => {
                let cCell = document.createElement('div');
                cCell.className = "cell category";
                cCell.innerText = cat.cat;
                board.appendChild(cCell);
                cat.qs.forEach((q, qIdx) => {
                    let qCell = document.createElement('div');
                    qCell.className = "cell";
                    if(used.has(rIdx+'-'+qIdx)) qCell.classList.add('used');
                    qCell.innerText = q.p;
                    qCell.onclick = () => {
                        curPts = q.p;
                        used.add(rIdx+'-'+qIdx);
                        document.getElementById('question-text').innerText = q.q;
                        document.getElementById('answer-text').innerText = q.a;
                        document.getElementById('overlay').style.display='flex';
                        document.getElementById('snd-think').play();
                    };
                    board.appendChild(qCell);
                });
            });
        }

        function showAnswer() {
            document.getElementById('answer-text').style.display='block';
            document.getElementById('show-btn').style.display='none';
            document.getElementById('skip-btn').style.display='block';
            let ctrl = document.getElementById('admin-controls');
            ctrl.innerHTML = ""; ctrl.style.display='flex';
            teams.forEach((t, i) => {
                let b = document.createElement('button');
                b.className = "menu-btn"; b.style.width="160px";
                b.innerText = t.name;
                b.onclick = () => { teams[i].score += curPts; document.getElementById('snd-correct').play(); closeQuestion(); };
                ctrl.appendChild(b);
            });
        }

        function closeQuestion() {
            document.getElementById('overlay').style.display='none';
            document.getElementById('answer-text').style.display='none';
            document.getElementById('show-btn').style.display='block';
            document.getElementById('admin-controls').style.display='none';
            document.getElementById('skip-btn').style.display='none';
            document.getElementById('snd-think').pause();
            document.getElementById('snd-think').currentTime = 0;
            updateScores(); renderBoard();
        }

        function updateScores() {
            let res = "";
            teams.forEach(t => {
                res += `
                <div class="team-badge">
                    <span class="score-name">${t.name}</span>
                    <span class="score-val">${t.score}</span>
                </div>`;
            });
            document.getElementById('score-board').innerHTML = res;
        }

        function closeEditor() { document.getElementById('editor-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; }
        function openMenu() { document.getElementById('game-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; document.getElementById('cont-btn').style.display='block'; }
        function continueGame() { document.getElementById('menu-screen').style.display='none'; document.getElementById('game-screen').style.display='flex'; }
    </script>
</body>
</html>
