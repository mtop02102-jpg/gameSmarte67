<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СВОЯ ИГРА: ULTIMATE EDITION</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000080; color: white; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #0000a0 0%, #000040 100%); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .menu-btn { background: gold; color: black; padding: 15px 30px; font-size: 24px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; margin: 10px; width: 380px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .menu-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px gold; }
        
        /* Игровое поле */
        #game-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; background: #000080; }
        #board { display: grid; gap: 10px; padding: 20px; width: 95%; max-width: 1700px; }
        .cell { background: #0606ed; border: 3px solid gold; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; font-size: 2.5vw; }
        .category { background: #0000cd; cursor: default; border-color: #4169e1; padding: 5px; font-size: 1.2vw; }
        .cell.used { background: #000033 !important; color: #000066 !important; border-color: #000044 !important; pointer-events: none; }

        /* Настройки и Редактор */
        .settings-block { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; border: 1px solid gold; margin-bottom: 15px; width: 90%; max-width: 900px; color: white; }
        .editor-container { background: white; color: black; padding: 20px; border-radius: 15px; width: 95%; max-height: 85vh; overflow-y: auto; text-align: left; }
        input, select { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin: 5px; }

        /* Окно вопроса */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        #question-text { font-size: 4vw; text-align: center; margin-bottom: 20px; max-width: 85%; }
        #q-img { max-height: 40vh; max-width: 80%; border: 3px solid white; display: none; margin-bottom: 20px; }
        #answer-text { font-size: 3vw; color: gold; margin-bottom: 20px; display: none; font-weight: bold; border-top: 2px solid gold; padding-top: 10px; }
        .controls { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-score { padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; font-size: 14px; }

        /* Табло */
        .score-board { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; width: 100%; }
        .team-badge { padding: 10px 25px; border-radius: 12px; border: 2px solid white; text-align: center; min-width: 140px; }
        .score-val { font-size: 35px; font-weight: bold; display: block; }
    </style>
</head>
<body>

    <!-- Звуки -->
    <audio id="snd-intro" src="intro.mp3" loop></audio>
    <audio id="snd-think" src="think.mp3"></audio>
    <audio id="snd-correct" src="correct.mp3"></audio>

    <!-- МЕНЮ -->
    <div id="menu-screen" class="screen" style="display: flex;">
        <h1 style="font-size: 80px; color: gold; margin-bottom: 40px;">СВОЯ ИГРА Йоу!</h1>
        <button class="menu-btn" onclick="startAudio(); continueGame()" id="cont-btn" style="display:none">ПРОДОЛЖИТЬ</button>
        <button class="menu-btn" onclick="startAudio(); showSettings()">НАСТРОЙКИ (Поле и Команды)</button>
        <button class="menu-btn" onclick="startAudio(); showEditor()">РЕДАКТОР ВОПРОСОВ ✏️</button>
        <button class="menu-btn" onclick="startAudio(); startNewGame()">ИГРАТЬ!</button>
    </div>

    <!-- НАСТРОЙКИ -->
    <div id="settings-screen" class="screen">
        <h1>Настройки параметров</h1>
        <div class="settings-block">
            <h3>1. Конструктор поля</h3>
            Тем: <input type="number" id="cfg-cats" value="3" min="1" max="10"> 
            Вопросов: <input type="number" id="cfg-qpc" value="5" min="1" max="6">
            Очки: <input type="number" id="cfg-step" value="100" step="100">
        </div>
        <div class="settings-block">
            <h3>2. Команды</h3>
            Кол-во: <select id="team-count" onchange="generateTeamInputs()"><option>1</option><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option></select>
            <div id="teams-config-container" style="margin-top:15px;"></div>
        </div>
        <button class="menu-btn" onclick="saveAllSettings()">СОХРАНИТЬ И НАЗАД</button>
    </div>

    <!-- РЕДАКТОР -->
    <div id="editor-screen" class="screen">
        <div class="editor-container">
            <h2>Редактор вопросов</h2>
            <div id="editor-fields"></div>
            <div style="margin-top:20px; text-align:center;">
                <button class="menu-btn" onclick="saveQuestions()" style="background:green; color:white; width:250px;">СОХРАНИТЬ ВОПРОСЫ</button>
                <button class="menu-btn" onclick="closeEditor()" style="background:#555; color:white; width:250px;">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="game-screen" class="screen">
        <button onclick="openMenu()" style="position:fixed; top:20px; right:20px; padding:15px; background:gold; border:none; font-weight:bold; cursor:pointer; border-radius:10px; z-index:100;">МЕНЮ</button>
        <div id="board"></div>
        <div class="score-board" id="score-board"></div>
    </div>

    <!-- ОКНО ВОПРОСА -->
    <div id="overlay">
        <div id="question-text">Текст вопроса</div>
        <img id="q-img" src="" alt="фото">
        <div id="answer-text">ОТВЕТ</div>
        <button id="show-btn" class="menu-btn" onclick="showAnswer()">ПОКАЗАТЬ ОТВЕТ</button>
        <div id="admin-controls" class="controls"></div>
        <button id="skip-btn" class="menu-btn" style="background:#555; width:300px; display:none; color:white;" onclick="closeQuestion()">Пропустить</button>
    </div>

    <script>
        let config = { cats: 3, qPerCat: 5, step: 100 };
        let gameData = [];
        let teams = [];
        let used = new Set();
        let curPts = 0;

        // Загрузка или создание данных
        function initGameData() {
            const saved = localStorage.getItem('myGameData');
            if(saved) {
                gameData = JSON.parse(saved);
                config.cats = gameData.length;
                config.qPerCat = gameData[0].qs.length;
            } else {
                generateEmptyData();
            }
        }

        function generateEmptyData() {
            gameData = [];
            for(let r=0; r<config.cats; r++) {
                let row = { cat: "ТЕМА " + (r+1), qs: [] };
                for(let c=0; c<config.qPerCat; c++) {
                    row.qs.push({ q: "Вопрос за " + (c+1)*config.step, a: "Ответ", img: "" });
                }
                gameData.push(row);
            }
        }

        function startAudio() { document.getElementById('snd-intro').play().catch(()=>{}); }

        function showSettings() {
            document.getElementById('menu-screen').style.display='none';
            document.getElementById('settings-screen').style.display='flex';
            generateTeamInputs();
        }

        function generateTeamInputs() {
            const c = document.getElementById('team-count').value;
            const res = document.getElementById('teams-config-container'); res.innerHTML = '';
            for(let i=1; i<=c; i++) {
                res.innerHTML += `<div><input type="text" id="tn${i}" value="Команда ${i}"> <input type="color" id="tc${i}" value="${['#28a745','#007bff','#fd7e14','#e83e8c','#6f42c1','#17a2b8'][i-1]}"></div>`;
            }
        }

        function saveAllSettings() {
            const newCats = parseInt(document.getElementById('cfg-cats').value);
            const newQpc = parseInt(document.getElementById('cfg-qpc').value);
            const newStep = parseInt(document.getElementById('cfg-step').value);
            
            if(newCats != config.cats || newQpc != config.qPerCat || newStep != config.step) {
                config.cats = newCats; config.qPerCat = newQpc; config.step = newStep;
                generateEmptyData(); // Пересоздаем, если изменили структуру
            }

            const tc = document.getElementById('team-count').value;
            teams = [];
            for(let i=1; i<=tc; i++) {
                teams.push({ name: document.getElementById('tn'+i).value, color: document.getElementById('tc'+i).value, score: 0 });
            }
            document.getElementById('settings-screen').style.display='none';
            document.getElementById('menu-screen').style.display='flex';
        }

        function showEditor() {
            document.getElementById('menu-screen').style.display='none';
            document.getElementById('editor-screen').style.display='flex';
            const f = document.getElementById('editor-fields'); f.innerHTML = '';
            gameData.forEach((row, r) => {
                let h = `<div style="border-bottom:2px solid gold; padding:15px;"><b>Тема ${r+1}:</b> <input type="text" id="ecat-${r}" value="${row.cat}"><br>`;
                row.qs.forEach((item, c) => {
                    h += `<div style="margin:5px 0;">(${(c+1)*config.step}) В: <input type="text" style="width:30%" id="eq-${r}-${c}" value="${item.q}"> 
                          О: <input type="text" style="width:20%" id="ea-${r}-${c}" value="${item.a}"> 
                          Фото: <input type="text" style="width:15%" id="ei-${r}-${c}" value="${item.img || ''}" placeholder="file.jpg"></div>`;
                });
                f.innerHTML += h + `</div>`;
            });
        }

        function saveQuestions() {
            gameData.forEach((row, r) => {
                row.cat = document.getElementById(`ecat-${r}`).value;
                row.qs.forEach((item, c) => {
                    item.q = document.getElementById(`eq-${r}-${c}`).value;
                    item.a = document.getElementById(`ea-${r}-${c}`).value;
                    item.img = document.getElementById(`ei-${r}-${c}`).value;
                });
            });
            localStorage.setItem('myGameData', JSON.stringify(gameData));
            closeEditor();
        }

        function closeEditor() { document.getElementById('editor-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; }

        function startNewGame() {
            if(teams.length === 0) saveAllSettings();
            used.clear(); teams.forEach(t => t.score = 0);
            document.getElementById('menu-screen').style.display='none';
            document.getElementById('game-screen').style.display='flex';
            document.getElementById('snd-intro').pause();
            initBoard(); updateSB();
        }

        function initBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            b.style.gridTemplateColumns = `240px repeat(${config.qPerCat}, 1fr)`;
            const h = Math.floor(75 / config.cats);
            gameData.forEach((row, r) => {
                const cat = document.createElement('div'); cat.className='cell category'; cat.innerText=row.cat; cat.style.height=h+'vh'; b.appendChild(cat);
                row.qs.forEach((item, c) => {
                    const cell = document.createElement('div'); cell.className='cell'; cell.style.height=h+'vh';
                    cell.innerText = (c+1)*config.step;
                    const id = r+'-'+c; if(used.has(id)) cell.classList.add('used');
                    cell.onclick = () => { if(!cell.classList.contains('used')){ curPts=(c+1)*config.step; used.add(id); cell.classList.add('used'); openQ(item); }};
                    b.appendChild(cell);
                });
            });
        }

        function openQ(item) {
            document.getElementById('question-text').innerText = item.q;
            const img = document.getElementById('q-img');
            if(item.img) { img.src = item.img; img.style.display='block'; } else { img.style.display='none'; }
            document.getElementById('answer-text').innerText = "ОТВЕТ: " + item.a;
            document.getElementById('answer-text').style.display='none';
            document.getElementById('show-btn').style.display='block';
            document.getElementById('admin-controls').style.display='none';
            document.getElementById('skip-btn').style.display='none';
            document.getElementById('snd-think').play().catch(()=>{});
            const ctrl = document.getElementById('admin-controls'); ctrl.innerHTML = '';
            teams.forEach((t, i) => {
                const btn = document.createElement('button'); btn.className='btn-score'; btn.style.background=t.color; btn.innerText="+ "+t.name;
                btn.onclick = () => { teams[i].score += curPts; document.getElementById('snd-correct').play().catch(()=>{}); updateSB(); closeQuestion(); };
                ctrl.appendChild(btn);
            });
            document.getElementById('overlay').style.display='flex';
        }

        function showAnswer() {
            document.getElementById('answer-text').style.display='block';
            document.getElementById('show-btn').style.display='none';
            document.getElementById('admin-controls').style.display='grid';
            document.getElementById('skip-btn').style.display='block';
            document.getElementById('snd-think').pause(); document.getElementById('snd-think').currentTime=0;
        }

        function updateSB() {
            const sb = document.getElementById('score-board'); sb.innerHTML = '';
            teams.forEach(t => { sb.innerHTML += `<div class="team-badge" style="background:${t.color}">${t.name}<span class="score-val">${t.score}</span></div>`; });
        }

        function openMenu() { document.getElementById('game-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; document.getElementById('cont-btn').style.display='block'; }
        function continueGame() { document.getElementById('menu-screen').style.display='none'; document.getElementById('game-screen').style.display='flex'; }
        function closeQuestion() { document.getElementById('overlay').style.display='none'; document.getElementById('snd-think').pause(); }

        initGameData();
    </script>
</body>
</html>
