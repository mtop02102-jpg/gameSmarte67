<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СВОЯ ИГРА: PROFESSIONAL EDITION</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000833; color: white; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .screen, #overlay { 
            background: radial-gradient(circle at center, #001a66 0%, #000833 100%);
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; 
        }

        /* КНОПКИ */
        .menu-btn { 
            background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%); 
            color: #000; padding: 15px 40px; font-size: 24px; font-weight: bold; 
            border: none; border-radius: 50px; cursor: pointer; margin: 10px; 
            width: 400px; transition: 0.3s; box-shadow: 0 5px 20px rgba(0,0,0,0.6); 
        }
        .menu-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); }

        /* ИГРОВОЕ ПОЛЕ */
        #game-screen { display: none; width: 100%; height: 100%; background: #000833; z-index: 500; }
        #board { display: grid; gap: 12px; padding: 25px; width: 95%; max-width: 1800px; margin: auto; }
        
        .cell { 
            background: linear-gradient(145deg, #0606ed, #0000a0);
            border: 2px solid #ffd700; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; cursor: pointer; 
            transition: 0.2s; text-align: center; font-size: 3vw;
        }
        .cell:hover { background: #1e90ff; border-color: #fff; }
        .category { background: #000080; font-size: 1.4vw; cursor: default; border-color: #4169e1; text-transform: uppercase; }
        .cell.used { background: #000520 !important; color: #001a66 !important; border-color: #001a66 !important; pointer-events: none; }

        /* ТАБЛО ОЧКОВ */
        .score-board { display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap; width: 100%; }
        .team-badge { padding: 15px 30px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.5); text-align: center; min-width: 150px; }
        .score-val { font-size: 35px; font-weight: bold; display: block; }

        /* УЛУЧШЕННЫЙ РЕДАКТОР */
        .editor-container { 
            background: #f4f4f9; color: #333; padding: 30px; border-radius: 20px; 
            width: 95%; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .editor-topic-card { 
            background: #fff; border-left: 10px solid #000833; padding: 20px; 
            margin-bottom: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .editor-grid-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 10px; margin-top: 10px; align-items: center; }
        .editor-header { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 10px; font-weight: bold; color: #666; font-size: 14px; }
        
        input { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }
        input:focus { border-color: #000833; outline: none; box-shadow: 0 0 5px rgba(0,8,51,0.2); }

        #question-text { font-size: 4.5vw; text-align: center; margin-bottom: 30px; }
        #answer-text { font-size: 3.5vw; color: #ffd700; margin-bottom: 30px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <!-- ЗВУКИ ПО ПРЯМЫМ ССЫЛКАМ -->
    <audio id="snd-intro" src="https://www.soundboard.com" loop></audio>
    <audio id="snd-think" src="https://www.soundboard.com"></audio>
    <audio id="snd-correct" src="https://www.myinstants.com"></audio>

    <!-- ЭКРАН МЕНЮ -->
    <div id="menu-screen" class="screen" style="display: flex;">
        <h1 style="font-size: 100px; color: gold; margin-bottom: 40px; text-shadow: 0 0 30px rgba(255,215,0,0.5);">СВОЯ ИГРА</h1>
        <button class="menu-btn" onclick="startAudio(); continueGame()" id="cont-btn" style="display:none">ПРОДОЛЖИТЬ</button>
        <button class="menu-btn" onclick="startAudio(); showSettings()">НАСТРОЙКИ ПОЛЯ</button>
        <button class="menu-btn" onclick="startAudio(); showEditor()">РЕДАКТОР ВОПРОСОВ ✏️</button>
        <button class="menu-btn" onclick="startAudio(); startNewGame()">ИГРАТЬ!</button>
    </div>

    <!-- ЭКРАН НАСТРОЕК -->
    <div id="settings-screen" class="screen">
        <div style="background: rgba(255,255,255,0.1); padding: 40px; border-radius: 25px; border: 1px solid gold;">
            <h2>Параметры сетки</h2>
            Тем: <input type="number" id="cfg-cats" value="3" min="1" max="10"> 
            Вопросов: <input type="number" id="cfg-qpc" value="5" min="1" max="6">
            <hr style="opacity:0.2; margin: 20px 0;">
            <h2>Команды</h2>
            Кол-во: <select id="team-count" onchange="generateTeamInputs()" style="font-size: 20px;"><option>1</option><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option></select>
            <div id="teams-config-container" style="margin-top:20px; display: flex; flex-wrap: wrap; justify-content: center;"></div>
            <button class="menu-btn" onclick="saveAllSettings()" style="margin-top:30px; background: #28a745; color: #fff; width: 250px;">ГОТОВО</button>
        </div>
    </div>

    <!-- ЭКРАН УЛУЧШЕННОГО РЕДАКТОРА -->
    <div id="editor-screen" class="screen">
        <div class="editor-container">
            <h1 style="text-align:center; color:#000833">Конструктор Вопросов</h1>
            <div id="editor-fields"></div>
            <div style="text-align:center; margin-top:30px; position: sticky; bottom: 0; background: #f4f4f9; padding: 20px; border-top: 2px solid #ddd;">
                <button class="menu-btn" onclick="saveQuestions()" style="background:green; color:white; width:220px;">СОХРАНИТЬ</button>
                <button class="menu-btn" onclick="closeEditor()" style="background:#666; color:white; width:220px;">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <!-- ГЕЙМПЛЕЙ -->
    <div id="game-screen" class="screen" style="display:none; justify-content: flex-start; padding-top: 50px;">
        <button onclick="openMenu()" style="position:fixed; top:20px; right:20px; padding:15px; background:gold; border:none; font-weight:bold; cursor:pointer; border-radius:10px; z-index:2000;">МЕНЮ</button>
        <div id="board"></div>
        <div class="score-board" id="score-board"></div>
    </div>

    <!-- ВОПРОС -->
    <div id="overlay">
        <div id="question-text">Текст вопроса</div>
        <div id="answer-text">ОТВЕТ</div>
        <button id="show-btn" class="menu-btn" onclick="showAnswer()">ОТВЕТ</button>
        <div id="admin-controls" style="display:none; grid-template-columns: repeat(3, 1fr); gap: 15px;"></div>
        <button id="skip-btn" class="menu-btn" style="background:#444; width:280px; display:none; color:white; margin-top:20px" onclick="closeQuestion()">Пропустить</button>
    </div>

    <script>
        let config = { cats: 3, qPerCat: 5 };
        let gameData = [];
        let teams = [];
        let used = new Set();
        let curPts = 0;

        function startAudio() { document.getElementById('snd-intro').play().catch(()=>{}); }

        function generateEmptyData() {
            gameData = [];
            for(let r=0; r<config.cats; r++) {
                let row = { cat: "ТЕМА " + (r+1), qs: [] };
                for(let c=0; c<config.qPerCat; c++) { row.qs.push({ q: "Вопрос", a: "Ответ", p: (c+1)*100 }); }
                gameData.push(row);
            }
        }

        function showSettings() { document.getElementById('menu-screen').style.display='none'; document.getElementById('settings-screen').style.display='flex'; generateTeamInputs(); }
        function generateTeamInputs() {
            const c = document.getElementById('team-count').value;
            const res = document.getElementById('teams-config-container'); res.innerHTML = '';
            for(let i=1; i<=c; i++) {
                res.innerHTML += `<div style="margin:5px;"><input type="text" id="tn${i}" value="Команда ${i}" style="width:100px"> <input type="color" id="tc${i}" value="${['#28a745','#007bff','#fd7e14','#e83e8c','#6f42c1','#17a2b8'][i-1]}"></div>`;
            }
        }

        function saveAllSettings() {
            const nc = parseInt(document.getElementById('cfg-cats').value);
            const nq = parseInt(document.getElementById('cfg-qpc').value);
            if(nc != config.cats || nq != config.qPerCat) { config.cats = nc; config.qPerCat = nq; generateEmptyData(); }
            const tc = document.getElementById('team-count').value;
            teams = [];
            for(let i=1; i<=tc; i++) { teams.push({ name: document.getElementById('tn'+i).value, color: document.getElementById('tc'+i).value, score: 0 }); }
            document.getElementById('settings-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex';
        }

        function showEditor() {
            if(gameData.length === 0) generateEmptyData();
            document.getElementById('menu-screen').style.display='none';
            document.getElementById('editor-screen').style.display='flex';
            const f = document.getElementById('editor-fields'); f.innerHTML = '';
            gameData.forEach((row, r) => {
                let h = `<div class="editor-topic-card">
                            Название темы: <input type="text" id="ecat-${r}" value="${row.cat}" style="font-weight:bold; width:300px; margin-bottom:15px"><br>
                            <div class="editor-header"><div>Баллы</div><div>Вопрос</div><div>Правильный ответ</div></div>`;
                row.qs.forEach((item, c) => {
                    h += `<div class="editor-grid-row">
                            <input type="number" id="ep-${r}-${c}" value="${item.p}">
                            <input type="text" id="eq-${r}-${c}" value="${item.q}" placeholder="Текст вопроса...">
                            <input type="text" id="ea-${r}-${c}" value="${item.a}" placeholder="Ответ...">
                          </div>`;
                });
                f.innerHTML += h + `</div>`;
            });
        }

        function saveQuestions() {
            gameData.forEach((row, r) => {
                row.cat = document.getElementById(`ecat-${r}`).value;
                row.qs.forEach((item, c) => {
                    item.p = parseInt(document.getElementById(`ep-${r}-${c}`).value);
                    item.q = document.getElementById(`eq-${r}-${c}`).value;
                    item.a = document.getElementById(`ea-${r}-${c}`).value;
                });
            });
            localStorage.setItem('myProData', JSON.stringify(gameData));
            closeEditor();
        }

        function closeEditor() { document.getElementById('editor-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; }

        function startNewGame() {
            if(teams.length === 0) saveAllSettings();
            used.clear(); teams.forEach(t => t.score = 0);
            document.getElementById('menu-screen').style.display='none';
            document.getElementById('game-screen').style.display='flex';
            initBoard(); updateSB();
            document.getElementById('snd-intro').pause();
        }

        function initBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            b.style.gridTemplateColumns = `240px repeat(${config.qPerCat}, 1fr)`;
            const h = Math.floor(70 / config.cats);
            gameData.forEach((row, rIdx) => {
                const cat = document.createElement('div'); cat.className='cell category'; cat.innerText=row.cat; cat.style.height=h+'vh'; b.appendChild(cat);
                row.qs.forEach((item, cIdx) => {
                    const cell = document.createElement('div'); cell.className='cell'; cell.style.height=h+'vh';
                    cell.innerText = item.p;
                    const id = rIdx+'-'+cIdx; if(used.has(id)) cell.classList.add('used');
                    cell.onclick = () => { if(!cell.classList.contains('used')){ curPts=item.p; used.add(id); cell.classList.add('used'); openQ(item); }};
                    b.appendChild(cell);
                });
            });
        }

        function openQ(item) {
            document.getElementById('question-text').innerText = item.q;
            document.getElementById('answer-text').innerText = "ОТВЕТ: " + item.a;
            document.getElementById('answer-text').style.display='none';
            document.getElementById('show-btn').style.display='block';
            document.getElementById('admin-controls').style.display='none';
            document.getElementById('skip-btn').style.display='none';
            document.getElementById('snd-think').play().catch(()=>{});
            const ctrl = document.getElementById('admin-controls'); ctrl.innerHTML = '';
            teams.forEach((t, i) => {
                const btn = document.createElement('button'); btn.style.cssText = `background:${t.color}; color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;`;
                btn.innerText = "+ " + t.name;
                btn.onclick = () => { teams[i].score += curPts; document.getElementById('snd-correct').play().catch(()=>{}); updateSB(); closeQuestion(); };
                ctrl.appendChild(btn);
            });
            document.getElementById('overlay').style.display='flex';
        }

        function showAnswer() {
            document.getElementById('answer-text').style.display='block';
            document.getElementById('show-btn').style.display='none';
            document.getElementById('admin-controls').style.display='grid';
            document.getElementById('skip-btn').style.display='block';
            document.getElementById('snd-think').pause(); document.getElementById('snd-think').currentTime=0;
        }

        function updateSB() {
            const sb = document.getElementById('score-board'); sb.innerHTML = '';
            teams.forEach(t => { sb.innerHTML += `<div class="team-badge" style="background:${t.color}">${t.name}<span class="score-val">${t.score}</span></div>`; });
        }

        function openMenu() { document.getElementById('game-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; document.getElementById('cont-btn').style.display='block'; document.getElementById('snd-intro').play().catch(()=>{}); }
        function continueGame() { document.getElementById('menu-screen').style.display='none'; document.getElementById('game-screen').style.display='flex'; document.getElementById('snd-intro').pause(); }
        function closeQuestion() { document.getElementById('overlay').style.display='none'; document.getElementById('snd-think').pause(); }

        const saved = localStorage.getItem('myProData');
        if(saved) gameData = JSON.parse(saved);
    </script>
</body>
</html>
