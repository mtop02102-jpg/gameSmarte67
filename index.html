<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СВОЯ ИГРА: PC ELITE</title>
    <style>
        /* Базовые настройки для ПК */
        html, body { height: 100%; margin: 0; padding: 0; background: #000520; color: white; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; overflow: hidden; }
        
        /* Общий контейнер для центровки всего контента */
        .screen, #overlay { 
            background: radial-gradient(circle at center, #001a66 0%, #000520 100%);
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; padding: 40px; box-sizing: border-box; 
        }

        /* Кнопки управления */
        .menu-btn { 
            background: linear-gradient(to bottom, gold, #d4af37); color: #000; 
            padding: 14px 30px; font-size: 18px; font-weight: 800; 
            border: none; border-radius: 4px; cursor: pointer; margin: 8px; 
            width: 100%; max-width: 300px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px gold; background: #fff; }

        /* ИГРОВОЕ ПОЛЕ (Симметрия) */
        #game-screen { display: none; }
        #board-wrapper { 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; 
        }
        #board { 
            display: grid; gap: 12px; padding: 20px; 
            background: rgba(255,255,255,0.03); border-radius: 15px; border: 1px solid rgba(255,215,0,0.2);
        }
        
        .cell { 
            background: linear-gradient(145deg, #0000ff, #00008b); 
            border: 2px solid gold; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; font-size: 36px; 
            min-width: 140px; min-height: 90px; transition: 0.2s;
        }
        .cell:hover { background: #1e90ff; transform: scale(1.02); z-index: 2; }
        .category { 
            background: #00008b; font-size: 18px; cursor: default; border-color: #4169e1; 
            text-transform: uppercase; width: 220px; text-align: center; padding: 10px; line-height: 1.2;
        }
        .cell.used { background: #000b30 !important; color: #1a2a6c !important; border-color: #1a2a6c !important; cursor: default; }

        /* ТАБЛО КОМАНД (Вертикальное накопление) */
        .score-board { 
            display: flex; gap: 30px; justify-content: center; align-items: flex-start;
            padding: 30px; width: 100%; border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2);
        }
        .team-badge { 
            display: flex; flex-direction: column; align-items: center; 
            min-width: 160px; padding: 10px; border-bottom: 4px solid transparent; transition: 0.3s;
        }
        .score-name { font-size: 18px; font-weight: bold; text-transform: uppercase; color: #aaa; margin-bottom: 5px; }
        .score-val { font-size: 54px; font-weight: 900; color: gold; text-shadow: 0 0 15px rgba(255,215,0,0.3); }

        /* ОКНО ВОПРОСА */
        #question-text { font-size: 42px; text-align: center; margin-bottom: 40px; max-width: 1000px; font-weight: 400; }
        #answer-text { font-size: 36px; color: gold; margin-bottom: 30px; display: none; font-weight: 800; border-top: 2px solid gold; padding-top: 20px;}

        /* РЕДАКТОР */
        .editor-container { 
            background: #f8f9fa; color: #333; padding: 30px; border-radius: 8px; 
            width: 95%; max-width: 1200px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .editor-row { display: grid; grid-template-columns: 100px 1fr 1fr; gap: 15px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .editor-container h3 input { font-size: 20px; font-weight: bold; color: #00008b; border: none; border-bottom: 2px solid #00008b; width: 300px; outline: none; }
        input, input[type="number"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    </style>
</head>
<body>

    <audio id="snd-intro" src="intro.mp3" loop></audio>
    <audio id="snd-think" src="think.mp3"></audio>

    <!-- Экран старта -->
    <div id="start-overlay" class="screen" style="display:flex;">
        <h1 style="color:gold; font-size:72px; letter-spacing: 5px; margin-bottom: 50px;">СВОЯ ИГРА</h1>
        <button class="menu-btn" onclick="unlockAudio()">ВОЙТИ В СИСТЕМУ</button>
    </div>

    <!-- МЕНЮ -->
    <div id="menu-screen" class="screen">
        <h2 style="color:gold; margin-bottom:30px;">ГЛАВНОЕ МЕНЮ</h2>
        <button class="menu-btn" onclick="continueGame()" id="cont-btn" style="display:none">ПРОДОЛЖИТЬ ИГРУ</button>
        <button class="menu-btn" onclick="showSettings()">НАСТРОЙКИ КОМАНД</button>
        <button class="menu-btn" onclick="showEditor()">РЕДАКТОР ВОПРОСОВ</button>
        <button class="menu-btn" onclick="startNewGame()" style="background: #27ae60; color: white;">ЗАПУСТИТЬ ТУР</button>
    </div>

    <!-- ГЕЙМПЛЕЙ -->
    <div id="game-screen" class="screen">
        <button onclick="openMenu()" style="position:fixed; top:20px; right:20px; padding:12px 25px; background:rgba(255,255,255,0.1); color: white; border: 1px solid gold; cursor:pointer; font-weight: bold; border-radius: 4px;">ПАУЗА</button>
        <div id="board-wrapper">
            <div id="board"></div>
        </div>
        <div class="score-board" id="score-board"></div>
    </div>

    <!-- ВОПРОС -->
    <div id="overlay">
        <div id="question-text"></div>
        <div id="answer-text"></div>
        <button id="show-btn" class="menu-btn" onclick="showAnswer()">ПОКАЗАТЬ ОТВЕТ</button>
        <div id="admin-controls" style="display:none; gap:15px; flex-wrap:wrap; justify-content:center; margin-top:20px;"></div>
        <button id="skip-btn" class="menu-btn" style="background:#2c3e50; color:white; margin-top:30px; display:none;" onclick="closeQuestion()">Никто не ответил</button>
    </div>

    <!-- Настройки -->
    <div id="settings-screen" class="screen">
        <div style="background:rgba(255,255,255,0.05); padding:40px; border-radius:8px; border: 1px solid gold; text-align:center; min-width: 400px;">
            <h2 style="color:gold">УПРАВЛЕНИЕ КОМАНДАМИ</h2>
            <div style="margin: 20px 0;">
                Количество: <input type="number" id="team-count" value="4" min="1" max="6" style="width: 60px; text-align: center;" onchange="generateTeamInputs()">
            </div>
            <div id="teams-config-container" style="margin-bottom:30px;"></div>
            <button class="menu-btn" onclick="saveSettings()">СОХРАНИТЬ И ВЫЙТИ</button>
        </div>
    </div>

    <!-- Редактор -->
    <div id="editor-screen" class="screen">
        <div class="editor-container">
            <h2 style="margin-top:0; border-bottom: 2px solid #eee; padding-bottom: 10px;">РЕДАКТОР ВОПРОСОВ (Очки | Текст вопроса | Ответ)</h2>
            <div id="editor-fields"></div>
            <div style="position: sticky; bottom: -30px; background: white; padding: 20px; text-align: center; border-top: 1px solid #eee;">
                <button class="menu-btn" onclick="closeEditor()" style="background:#27ae60; color:white; max-width: 500px;">ПРИМЕНИТЬ ВСЕ ИЗМЕНЕНИЯ</button>
            </div>
        </div>
    </div>

    <script>
        let config = { cats: 3, qPerCat: 5 };
        let gameData = [];
        let teams = [];
        let used = new Set();
        let curPts = 0;

        function unlockAudio() {
            document.getElementById('start-overlay').style.display='none';
            document.getElementById('menu-screen').style.display='flex';
            document.getElementById('snd-intro').play().catch(()=>{});
        }

        function generateEmptyData() {
            if (gameData.length > 0) return;
            for(let r=0; r<config.cats; r++) {
                let row = { cat: "ТЕМА " + (r+1), qs: [] };
                for(let c=0; c<config.qPerCat; c++) { 
                    row.qs.push({ q: "Текст вопроса...", a: "Правильный ответ", p: (c + 1) * 100 }); 
                }
                gameData.push(row);
            }
        }

        function showEditor() {
            generateEmptyData();
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'flex';
            let container = document.getElementById('editor-fields');
            container.innerHTML = "";
            gameData.forEach((cat, cIdx) => {
                let div = document.createElement('div');
                div.style.marginBottom = "40px";
                div.innerHTML = `<h3><input type="text" value="${cat.cat}" onchange="gameData[${cIdx}].cat=this.value"></h3>`;
                cat.qs.forEach((q, qIdx) => {
                    div.innerHTML += `
                        <div class="editor-row">
                            <input type="number" value="${q.p}" onchange="gameData[${cIdx}].qs[${qIdx}].p=parseInt(this.value)">
                            <input type="text" placeholder="Вопрос" value="${q.q}" onchange="gameData[${cIdx}].qs[${qIdx}].q=this.value">
                            <input type="text" placeholder="Ответ" value="${q.a}" onchange="gameData[${cIdx}].qs[${qIdx}].a=this.value">
                        </div>`;
                });
                container.appendChild(div);
            });
        }

        function showSettings() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('settings-screen').style.display = 'flex';
            generateTeamInputs();
        }

        function generateTeamInputs() {
            let count = document.getElementById('team-count').value;
            let container = document.getElementById('teams-config-container');
            container.innerHTML = "";
            for(let i=0; i<count; i++) {
                container.innerHTML += `<div style="margin:8px"><input type="text" id="tname-${i}" value="${teams[i]?.name || 'КОМАНДА '+(i+1)}" style="width:250px"></div>`;
            }
        }

        function saveSettings() {
            let count = document.getElementById('team-count').value;
            teams = [];
            for(let i=0; i<count; i++) {
                teams.push({ name: document.getElementById('tname-'+i).value, score: 0 });
            }
            document.getElementById('settings-screen').style.display='none';
            document.getElementById('menu-screen').style.display='flex';
        }

        function startNewGame() {
            if(teams.length === 0) saveSettings();
            generateEmptyData();
            used.clear();
            document.getElementById('menu-screen').style.display='none';
            document.getElementById('game-screen').style.display='flex';
            renderBoard();
            updateScores();
        }

        function renderBoard() {
            let board = document.getElementById('board');
            board.style.gridTemplateColumns = `auto repeat(${config.qPerCat}, auto)`;
            board.innerHTML = "";
            gameData.forEach((cat, rIdx) => {
                let cCell = document.createElement('div');
                cCell.className = "cell category";
                cCell.innerText = cat.cat;
                board.appendChild(cCell);
                cat.qs.forEach((q, qIdx) => {
                    let qCell = document.createElement('div');
                    qCell.className = "cell";
                    if(used.has(rIdx+'-'+qIdx)) qCell.classList.add('used');
                    qCell.innerText = q.p;
                    qCell.onclick = () => {
                        if(used.has(rIdx+'-'+qIdx)) return;
                        curPts = q.p;
                        used.add(rIdx+'-'+qIdx);
                        document.getElementById('question-text').innerText = q.q;
                        document.getElementById('answer-text').innerText = q.a;
                        document.getElementById('overlay').style.display='flex';
                        document.getElementById('snd-think').play();
                    };
                    board.appendChild(qCell);
                });
            });
        }

        function showAnswer() {
            document.getElementById('answer-text').style.display='block';
            document.getElementById('show-btn').style.display='none';
            document.getElementById('skip-btn').style.display='block';
            let ctrl = document.getElementById('admin-controls');
            ctrl.innerHTML = ""; ctrl.style.display='flex';
            teams.forEach((t, i) => {
                let b = document.createElement('button');
                b.className = "menu-btn"; b.style.width="160px";
                b.innerText = t.name;
                b.onclick = () => { teams[i].score += curPts; closeQuestion(); };
                ctrl.appendChild(b);
            });
        }

        function closeQuestion() {
            document.getElementById('overlay').style.display='none';
            document.getElementById('answer-text').style.display='none';
            document.getElementById('show-btn').style.display='block';
            document.getElementById('admin-controls').style.display='none';
            document.getElementById('skip-btn').style.display='none';
            document.getElementById('snd-think').pause();
            document.getElementById('snd-think').currentTime = 0;
            updateScores(); renderBoard();
        }

        function updateScores() {
            let res = "";
            teams.forEach(t => {
                res += `
                <div class="team-badge">
                    <span class="score-name">${t.name}</span>
                    <span class="score-val">${t.score}</span>
                </div>`;
            });
            document.getElementById('score-board').innerHTML = res;
        }

        function closeEditor() { document.getElementById('editor-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; }
        function openMenu() { document.getElementById('game-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; document.getElementById('cont-btn').style.display='block'; }
        function continueGame() { document.getElementById('menu-screen').style.display='none'; document.getElementById('game-screen').style.display='flex'; }
    </script>
</body>
</html>
