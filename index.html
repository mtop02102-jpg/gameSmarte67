<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СВОЯ ИГРА: PC MAX</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #000520; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .screen, #overlay { 
            background: radial-gradient(circle at center, #001a66 0%, #000520 100%);
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; 
        }

        .menu-btn { 
            background: gold; color: #000; padding: 12px 25px; font-size: 18px; font-weight: 800; 
            border: none; border-radius: 6px; cursor: pointer; margin: 8px; width: 100%; max-width: 320px;
            transition: 0.2s; text-transform: uppercase;
        }
        .menu-btn:hover { transform: scale(1.05); background: #fff; box-shadow: 0 0 20px gold; }

        /* ИГРОВОЕ ПОЛЕ */
        #game-screen { display: none; }
        #board-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; }
        
        #board { 
            display: grid; 
            gap: 15px; 
            padding: 20px; 
            margin: auto;
            max-width: 95vw;
            max-height: 70vh;
        }
        
        .cell { 
            background: linear-gradient(145deg, #0000ff, #00008b); 
            border: 3px solid gold; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; cursor: pointer; 
            font-size: 50px; 
            min-width: 180px; 
            min-height: 110px; 
            padding: 15px;
            transition: 0.2s;
        }
        .cell:hover { background: #1e90ff; transform: scale(1.03); z-index: 10; }
        
        .category { 
            background: #00008b; 
            font-size: 22px; 
            cursor: default; 
            border-color: #4169e1; 
            text-transform: uppercase; 
            width: 280px; 
            text-align: center; 
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid #4169e1;
        }
        .cell.used { background: #000b30 !important; color: #1a2a6c !important; border-color: #1a2a6c !important; pointer-events: none; }

        /* ТАБЛО КОМАНД */
        .score-board { 
            display: flex; gap: 30px; justify-content: center; padding: 20px; 
            background: rgba(0,0,0,0.5); width: 100%; border-top: 4px solid gold; 
        }
        .team-badge { display: flex; flex-direction: column; align-items: center; text-align: center; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 8px; border: 1px solid #4169e1; min-width: 160px; }
        .score-name { font-size: 18px; font-weight: bold; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .score-val { font-size: 48px; font-weight: 900; color: gold; line-height: 1; text-shadow: 0 0 15px rgba(255,215,0,0.6); }
        .score-controls { display: flex; gap: 8px; margin-top: 8px; }
        .btn-sm { background: gold; border: none; font-weight: bold; padding: 4px 10px; cursor: pointer; border-radius: 3px; font-size: 14px; }
        .btn-sm:hover { background: #fff; }

        /* ОКНО ВОПРОСА */
        #question-text { font-size: 44px; text-align: center; margin-bottom: 35px; max-width: 1100px; line-height: 1.3; }
        #answer-text { font-size: 38px; color: gold; margin-bottom: 30px; font-weight: bold; border-top: 3px solid gold; padding-top: 20px; text-align: center; letter-spacing: 2px; }

        /* КНОПКИ НАЧИСЛЕНИЯ В ВОПРОСЕ */
        .admin-section { display: flex; gap: 15px; margin-top: 15px; background: rgba(0,0,0,0.4); padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,215,0,0.3); }
        .admin-column { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .admin-team-title { font-size: 14px; font-weight: bold; color: #fff; }
        .admin-btn { border: none; font-weight: bold; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 14px; color: #fff; min-width: 90px; }
        .admin-btn.plus { background: #27ae60; }
        .admin-btn.minus { background: #c0392b; }
        .admin-btn:hover { opacity: 0.9; transform: scale(1.05); }
    </style>
</head>
<body>

    <!-- ЭКРАН СТАРТА -->
    <div id="start-overlay" class="screen" style="display:flex;">
        <h1 style="color:gold; font-size:80px; text-shadow: 0 0 30px gold;">СВОЯ ИГРА</h1>
        <button class="menu-btn" onclick="unlockAudio()">ЗАПУСТИТЬ</button>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="menu-screen" class="screen">
        <button class="menu-btn" onclick="continueGame()" id="cont-btn" style="display:none">ПРОДОЛЖИТЬ</button>
        <button class="menu-btn" onclick="startNewGame()" style="background:#27ae60; color:#fff;">ИГРАТЬ!</button>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="game-screen" class="screen">
        <button onclick="openMenu()" style="position:fixed; top:20px; right:20px; padding:10px 20px; background:gold; border:none; font-weight:bold; cursor:pointer; border-radius:5px; z-index:200;">МЕНЮ</button>
        <div id="board-container">
            <div id="board"></div>
        </div>
        <div class="score-board" id="score-board"></div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ВОПРОСА -->
    <div id="overlay">
        <div id="question-text"></div>
        <div id="answer-text"></div>
        
        <div style="display: flex; gap: 15px; justify-content: center; width: 100%; max-width: 600px;">
            <button id="letter-btn" class="menu-btn" style="background: #1e90ff; color: #fff; font-size:20px;" onclick="revealNextLetter()">Открыть букву</button>
            <button id="show-btn" class="menu-btn" style="font-size:20px;" onclick="showAnswer()">Узнать ответ</button>
        </div>
        
        <!-- НАЧИСЛЕНИЕ БАЛЛОВ -->
        <div class="admin-section">
            <div class="admin-column">
                <span class="admin-team-title">Команда 1</span>
                <button class="admin-btn plus" onclick="awardPoints(1)">+ Баллы</button>
                <button class="admin-btn minus" onclick="deductPoints(1)">- Баллы</button>
            </div>
            <div class="admin-column">
                <span class="admin-team-title">Команда 2</span>
                <button class="admin-btn plus" onclick="awardPoints(2)">+ Баллы</button>
                <button class="admin-btn minus" onclick="deductPoints(2)">- Баллы</button>
            </div>
            <div class="admin-column">
                <span class="admin-team-title">Команда 3</span>
                <button class="admin-btn plus" onclick="awardPoints(3)">+ Баллы</button>
                <button class="admin-btn minus" onclick="deductPoints(3)">- Баллы</button>
            </div>
            <div class="admin-column">
                <span class="admin-team-title">Команда 4</span>
                <button class="admin-btn plus" onclick="awardPoints(4)">+ Баллы</button>
                <button class="admin-btn minus" onclick="deductPoints(4)">- Баллы</button>
            </div>
        </div>

        <button id="skip-btn" class="menu-btn" style="background:#333; color:#fff; margin-top:25px;" onclick="closeQuestion()">Никто не ответил / Закрыть</button>
    </div>

    <script>
        // =========================================================================
        // МЕСТО ДЛЯ ВАШИХ ВОПРОСОВ И ОТВЕТОВ (БАЗА ДАННЫХ ИГРЫ)
        // =========================================================================
        let gameData = [
            {
                cat: "БЬЮТИ И МОДА",
                qs: [
                    { p: 100, q: "Как называется популярная обувь на массивной подошве, получившая название в честь батончика?", a: "Сникеры" },
                    { p: 200, q: "Что такое хайлайтер и для чего его наносят на лицо?", a: "Хайлайтер" },
                    { p: 300, q: "Какой предмет гардероба, ставший культовым, придумала Коко Шанель в 1926 году?", a: "Платье" },
                    { p: 400, q: "Как называется легкий полупрозрачный крем, который одновременно увлажняет кожу и выравнивает тон (две буквы)?", a: "BB-крем" },
                    { p: 500, q: "Как называется стиль в одежде, имитирующий роскошный образ жизни старых европейских денег?", a: "Олд Мани" }
                ]
            },
            {
                cat: "МУЗЫКА И ТАНЦЫ",
                qs: [
                    { p: 100, q: "Как называется развлечение, когда люди собираются в баре и по очереди поют песни по тексту на экране?", a: "Караоке" },
                    { p: 200, q: "В каком парном латиноамериканском танце, партнерша делает плавные движения бедрами и волны телом?", a: "Бачата" },
                    { p: 300, q: "Какая певица установила мировой рекорд, собрав самый кассовый музыкальный тур в истории — The Eras Tour?", a: "Тейлор Свифт" },
                    { p: 400, q: "Как называется музыкальный беспроводной девайс, который часто берут с собой на пикник или пляж?", a: "Колонка" },
                    { p: 500, q: "Какая поп-дива исполнила легендарный хит «Single Ladies» и заставила весь мир повторять танец рук?", a: "Бейонсе" }
                ]
            },
            {
                cat: "ПУТЕШЕСТВИЯ И ОТДЫХ",
                qs: [
                    { p: 100, q: "Как называется популярная система обслуживания в отелях, когда еда и напитки включены в стоимость без ограничений?", a: "Все включено" },
                    { p: 200, q: "Какое французское слово означает дорожную сумку на колесиках или с ручкой для перевозки личных вещей?", a: "Чемодан" },
                    { p: 300, q: "В какой стране находится знаменитый курортный остров Бали, привлекающий миллионы туристов?", a: "Индонезия" },
                    { p: 400, q: "Как называется защитное средство, которое обязательно нужно наносить на кожу перед выходом на пляж, чтобы не обгореть?", a: "SPF-крем" },
                    { p: 500, q: "Какой город мира славится своими романтичными прогулками на гондолах по водным каналам?", a: "Венеция" }
                ]
            },
            {
                cat: "ЕДА И КУЛИНАРИЯ",
                qs: [
                    { p: 100, q: "Какой знаменитый итальянский десерт переводится как «вознеси меня вверх» из-за кофе и нежного мусса в составе?", a: "Тирамису" },
                    { p: 200, q: "Как называется популярный кофейный напиток, состоящий из эспрессо, большого количества молока и небольшого слоя пенки?", a: "Латте" },
                    { p: 300, q: "Какой изысканный зеленый японский чай в виде порошка взбивают венчиком и часто добавляют в десерты и латте?", a: "Матча" },
                    { p: 400, q: "Из какого фрукта (а точнее, маслянистой ягоды) делают знаменитый мексиканский соус гуакамоле?", a: "Авокадо" },
                    { p: 500, q: "Как называется французский воздушный пирог-тарт с основой из рубленого теста и нежной заливкой из яиц и сливок?", a: "Киш" }
                ]
            }
        ];

        // НАСТРОЙКА КОМАНД
        let teams = [
            { name: "Команда 1", score: 0 },
            { name: "Команда 2", score: 0 },
            { name: "Команда 3", score: 0 },
            { name: "Команда 4", score: 0 }
        ];

        let used = new Set();
        let curPts = 0;
        let currentActiveCellId = null;
        let currentFullAnswer = "";
        let revealedLettersCount = 0;

        function unlockAudio() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
        }

        function openMenu() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('cont-btn').style.display = 'block';
        }

        function continueGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
        }

        function startNewGame() {
            used.clear();
            teams.forEach(t => t.score = 0);
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('cont-btn').style.display = 'block';
            buildBoard();
            updateScores();
        }

        function buildBoard() {
            let board = document.getElementById('board');
            board.innerHTML = "";
            if(gameData.length === 0) return;
            
            let numQs = gameData[0].qs.length;
            board.style.gridTemplateColumns = `280px repeat(${numQs}, 1fr)`;
            
            gameData.forEach((catObj, cIdx) => {
                let catCell = document.createElement('div');
                catCell.className = "cell category";
                catCell.innerText = catObj.cat;
                board.appendChild(catCell);
                
                catObj.qs.forEach((qObj, qIdx) => {
                    let cell = document.createElement('div');
                    cell.className = "cell";
                    let cellId = `${cIdx}-${qIdx}`;
                    cell.id = `cell-${cellId}`;
                    cell.innerText = qObj.p;
                    
                    if(used.has(cellId)) {
                        cell.classList.add('used');
                    } else {
                        cell.onclick = () => openQuestion(cellId, qObj.q, qObj.a, qObj.p);
                    }
                    board.appendChild(cell);
                });
            });
        }

        function updateScores() {
            let sb = document.getElementById('score-board');
            sb.innerHTML = "";
            teams.forEach((t, idx) => {
                let badge = document.createElement('div');
                badge.className = "team-badge";
                badge.innerHTML = `
                    <div class="score-name">${t.name}</div> 
                    <div class="score-val">${t.score}</div> 
                    <div class="score-controls"> 
                        <button class="btn-sm" onclick="adjustScoreDirectly(${idx}, 100)">+100</button> 
                        <button class="btn-sm" onclick="adjustScoreDirectly(${idx}, -100)">-100</button> 
                    </div>`;
                sb.appendChild(badge);
            });
        }

        function adjustScoreDirectly(tIdx, val) {
            teams[tIdx].score += val;
            updateScores();
        }

        function openQuestion(cellId, qText, aText, points) {
            currentActiveCellId = cellId;
            curPts = points;
            currentFullAnswer = aText;
            revealedLettersCount = 0;
            document.getElementById('question-text').innerText = qText;
            renderMaskedAnswer();
            document.getElementById('show-btn').style.display = "block";
            document.getElementById('letter-btn').style.display = "block";
            document.getElementById('overlay').style.display = "flex";
        }

        function renderMaskedAnswer() {
            let masked = "";
            let currentLetterIdx = 0;
            for (let i = 0; i < currentFullAnswer.length; i++) {
                let char = currentFullAnswer[i];
                if (char === " " || char === "-") {
                    masked += char;
                } else {
                    if (currentLetterIdx < revealedLettersCount) {
                        masked += char;
                    } else {
                        masked += "*";
                    }
                    currentLetterIdx++;
                }
            }
            document.getElementById('answer-text').innerText = "ОТВЕТ: " + masked;
        }

        function revealNextLetter() {
            let totalLetters = currentFullAnswer.replace(/[\s-]/g, "").length;
            if (revealedLettersCount < totalLetters) {
                revealedLettersCount++;
                renderMaskedAnswer();
            }
            if (revealedLettersCount >= totalLetters) {
                document.getElementById('letter-btn').style.display = "none";
                document.getElementById('show-btn').style.display = "none";
            }
        }

        function showAnswer() {
            document.getElementById('answer-text').innerText = "ОТВЕТ: " + currentFullAnswer;
            document.getElementById('show-btn').style.display = "none";
            document.getElementById('letter-btn').style.display = "none";
        }

        function awardPoints(teamNum) {
            teams[teamNum - 1].score += curPts;
            updateScores();
            closeQuestion();
        }

        function deductPoints(teamNum) {
            teams[teamNum - 1].score -= curPts;
            updateScores();
        }

        function closeQuestion() {
            if(currentActiveCellId) {
                used.add(currentActiveCellId);
                let cell = document.getElementById(`cell-${currentActiveCellId}`);
                if(cell) {
                    cell.classList.add('used');
