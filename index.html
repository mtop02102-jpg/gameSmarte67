<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СВОЯ ИГРА: TV EDITION</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000833; color: white; font-family: 'Segoe UI', Arial, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Экраны */
        .screen, #overlay { 
            background: radial-gradient(circle at center, #001a66 0%, #000833 100%);
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; 
        }

        /* КНОПКИ МЕНЮ */
        .menu-btn { 
            background: gold; color: #000; padding: 20px 50px; font-size: 32px; font-weight: 900; 
            border: none; border-radius: 60px; cursor: pointer; margin: 15px; 
            width: 500px; transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
            text-transform: uppercase;
        }
        .menu-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px gold; }

        /* Игровое поле */
        #game-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #board { display: grid; gap: 15px; padding: 30px; width: 98%; max-width: 1900px; }
        
        .cell { 
            background: linear-gradient(145deg, #0606ed, #0000a0); 
            border: 4px solid gold; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; cursor: pointer; 
            transition: 0.2s; text-align: center; font-size: 4vw; /* Огромные цифры очков */
        }
        .category { background: #0000cd; font-size: 1.8vw; cursor: default; border-color: #4169e1; padding: 10px; text-transform: uppercase; }
        .cell.used { background: #000033 !important; color: #000080 !important; border-color: #000050 !important; pointer-events: none; }

        /* ОКНО ВОПРОСА (ДЛЯ ТЕЛЕВИЗОРА) */
        #question-text { 
            font-size: 6vw; /* ГИГАНТСКИЙ ШРИФТ ВОПРОСА */
            font-weight: 800;
            text-align: center; 
            margin-bottom: 40px; 
            max-width: 90%; 
            line-height: 1.1;
            text-shadow: 4px 4px 15px black;
        }
        #answer-text { 
            font-size: 5vw; /* ГИГАНТСКИЙ ШРИФТ ОТВЕТА */
            color: gold; 
            margin-bottom: 40px; 
            display: none; 
            font-weight: 900; 
            border-top: 5px solid gold; 
            padding-top: 20px;
            text-transform: uppercase;
        }

        /* Табло очков */
        .score-board { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; width: 100%; }
        .team-badge { padding: 15px 30px; border-radius: 20px; border: 4px solid white; text-align: center; min-width: 200px; }
        .score-name { font-size: 24px; font-weight: bold; display: block; margin-bottom: 5px; }
        .score-val { font-size: 60px; font-weight: 900; display: block; color: gold; }

        /* Редактор */
        .editor-container { background: white; color: black; padding: 30px; border-radius: 20px; width: 95%; max-height: 85vh; overflow-y: auto; text-align: left; }
        input { padding: 10px; font-size: 18px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <audio id="snd-intro" src="intro.mp3" loop></audio>
    <audio id="snd-think" src="think.mp3"></audio>
    <audio id="snd-correct" src="correct.mp3"></audio>

    <div id="start-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000833; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:gold; font-size:80px; text-shadow: 0 0 30px gold;">СВОЯ ИГРА</h1>
        <button class="menu-btn" onclick="unlockAudio()">ЗАПУСТИТЬ НА ТВ 📺</button>
    </div>

    <!-- МЕНЮ -->
    <div id="menu-screen" class="screen">
        <button class="menu-btn" onclick="continueGame()" id="cont-btn" style="display:none">ПРОДОЛЖИТЬ</button>
        <button class="menu-btn" onclick="showSettings()">НАСТРОЙКИ</button>
        <button class="menu-btn" onclick="showEditor()">РЕДАКТОР ВОПРОСОВ</button>
        <button class="menu-btn" onclick="startNewGame()">НАЧАТЬ ИГРУ!</button>
    </div>

    <!-- ИГРА -->
    <div id="game-screen" class="screen" style="background:#000833;">
        <button onclick="openMenu()" style="position:fixed; top:20px; right:20px; padding:20px; background:gold; border:none; font-weight:bold; cursor:pointer; border-radius:15px; z-index:100; font-size:24px;">МЕНЮ</button>
        <div id="board"></div>
        <div class="score-board" id="score-board"></div>
    </div>

    <!-- ОКНО ВОПРОСА -->
    <div id="overlay">
        <div id="question-text">Текст вопроса</div>
        <div id="answer-text">ОТВЕТ</div>
        <button id="show-btn" class="menu-btn" onclick="showAnswer()" style="width:600px; font-size:40px;">ПОКАЗАТЬ ОТВЕТ</button>
        <div id="admin-controls" style="display:none; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top:30px;"></div>
        <button id="skip-btn" class="menu-btn" style="background:#444; width:400px; display:none; color:white; font-size: 24px;" onclick="closeQuestion()">Никто не ответил</button>
    </div>

    <!-- (Настройки и Редактор остаются функциональными как прежде) -->
    <div id="settings-screen" class="screen">
        <div style="background:rgba(255,255,255,0.1); padding:40px; border-radius:25px; border:2px solid gold;">
            <h2 style="font-size:40px; color:gold">Размер поля</h2>
            Тем: <input type="number" id="cfg-cats" value="3" style="width:100px"> 
            Вопросов: <input type="number" id="cfg-qpc" value="5" style="width:100px">
            <hr>
            <h2 style="font-size:40px; color:gold">Команды</h2>
            Кол-во: <select id="team-count" onchange="generateTeamInputs()" style="font-size:24px"><option>1</option><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option></select>
            <div id="teams-config-container" style="margin-top:20px"></div>
            <button class="menu-btn" onclick="saveAllSettings()" style="background:green; color:white; width:300px; margin-top:40px">ГОТОВО</button>
        </div>
    </div>

    <div id="editor-screen" class="screen">
        <div class="editor-container">
            <h2 style="font-size:40px">Редактор</h2>
            <div id="editor-fields"></div>
            <div style="text-align:center; margin-top:40px;">
                <button class="menu-btn" onclick="saveQuestions()" style="background:green; color:white; width:300px;">СОХРАНИТЬ</button>
                <button class="menu-btn" onclick="closeEditor()" style="background:#555; color:white; width:300px;">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script>
        let config = { cats: 3, qPerCat: 5 };
        let gameData = [];
        let teams = [];
        let used = new Set();
        let curPts = 0;

        function unlockAudio() {
            document.getElementById('start-overlay').style.display='none';
            document.getElementById('menu-screen').style.display='flex';
            document.getElementById('snd-intro').play().catch(()=>{});
        }

        function generateEmptyData() {
            gameData = [];
            for(let r=0; r<config.cats; r++) {
                let row = { cat: "ТЕМА " + (r+1), qs: [] };
                for(let c=0; c<config.qPerCat; c++) { row.qs.push({ q: "Текст вопроса", a: "Ответ", p: (c + 1) * 100 }); }
                gameData.push(row);
            }
        }

        function showEditor() {
            if(gameData.length === 0) generateEmptyData();
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'flex';
            const f = document.getElementById('editor-fields'); f.innerHTML = '';
            gameData.forEach((row, rIdx) => {
                let h = `<div style="background:#eee; padding:20px; margin-bottom:20px; border-radius:15px;"><b>Тема:</b> <input type="text" id="ecat-${rIdx}" value="${row.cat}" style="width:300px"><br>`;
                row.qs.forEach((item, cIdx) => {
                    h += `<div style="margin:10px 0; border-top:1px solid #ccc; padding-top:10px;">
                            Баллы: <input type="text" id="ep-${rIdx}-${cIdx}" value="${item.p}" style="width:80px; font-weight:bold">
                            В: <input type="text" id="eq-${rIdx}-${cIdx}" value="${item.q}" style="width:40%">
                            О: <input type="text" id="ea-${rIdx}-${cIdx}" value="${item.a}" style="width:25%">
                          </div>`;
                });
                f.innerHTML += h + `</div>`;
            });
        }

        function saveQuestions() {
            gameData.forEach((row, rIdx) => {
                row.cat = document.getElementById(`ecat-${rIdx}`).value;
                row.qs.forEach((item, cIdx) => {
                    item.p = document.getElementById(`ep-${rIdx}-${cIdx}`).value;
                    item.q = document.getElementById(`eq-${rIdx}-${cIdx}`).value;
                    item.a = document.getElementById(`ea-${rIdx}-${cIdx}`).value;
                });
            });
            localStorage.setItem('myTVGameData', JSON.stringify(gameData));
            closeEditor();
        }

        function initBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            b.style.gridTemplateColumns = `280px repeat(${config.qPerCat}, 1fr)`;
            const h = Math.floor(70 / config.cats);
            gameData.forEach((row, rIdx) => {
                const cat = document.createElement('div'); cat.className='cell category'; cat.innerText=row.cat; cat.style.height=h+'vh'; b.appendChild(cat);
                row.qs.forEach((item, cIdx) => {
                    const cell = document.createElement('div'); cell.className='cell'; cell.style.height=h+'vh';
                    cell.innerText = item.p;
                    const id = rIdx+'-'+cIdx; if(used.has(id)) cell.classList.add('used');
                    cell.onclick = () => { if(!cell.classList.contains('used')){ 
                        curPts = isNaN(parseInt(item.p)) ? 0 : parseInt(item.p);
                        used.add(id); cell.classList.add('used'); openQ(item); 
                    }};
                    b.appendChild(cell);
                });
            });
        }

        function openQ(item) {
            document.getElementById('question-text').innerText = item.q;
            document.getElementById('answer-text').innerText = "ОТВЕТ: " + item.a;
            document.getElementById('answer-text').style.display='none';
            document.getElementById('show-btn').style.display='block';
            document.getElementById('admin-controls').style.display='none';
            document.getElementById('skip-btn').style.display='none';
            document.getElementById('snd-think').play().catch(()=>{});
            const ctrl = document.getElementById('admin-controls'); ctrl.innerHTML = '';
            teams.forEach((t, i) => {
                const btn = document.createElement('button'); btn.style.cssText = `background:${t.color}; color:white; padding:20px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:24px;`;
                btn.innerText = "+ " + t.name;
                btn.onclick = () => { teams[i].score += curPts; document.getElementById('snd-correct').play().catch(()=>{}); updateSB(); closeQuestion(); };
                ctrl.appendChild(btn);
            });
            document.getElementById('overlay').style.display='flex';
        }

        function showAnswer() {
            document.getElementById('answer-text').style.display='block';
            document.getElementById('show-btn').style.display='none';
            document.getElementById('admin-controls').style.display='grid';
            document.getElementById('skip-btn').style.display='block';
            document.getElementById('snd-think').pause(); document.getElementById('snd-think').currentTime=0;
        }

        function updateSB() {
            const sb = document.getElementById('score-board'); sb.innerHTML = '';
            teams.forEach(t => {
                sb.innerHTML += `<div class="team-badge" style="background:${t.color}">
                    <span class="score-name">${t.name}</span>
                    <span class="score-val">${t.score}</span>
                </div>`;
            });
        }

        // Остальные функции управления (стандарт)
        function showSettings() { document.getElementById('menu-screen').style.display='none'; document.getElementById('settings-screen').style.display='flex'; generateTeamInputs(); }
        function saveAllSettings() {
            const nc = parseInt(document.getElementById('cfg-cats').value);
            const nq = parseInt(document.getElementById('cfg-qpc').value);
            if(nc != config.cats || nq != config.qPerCat) { config.cats = nc; config.qPerCat = nq; generateEmptyData(); }
            const tc = document.getElementById('team-count').value;
            teams = []; for(let i=1; i<=tc; i++) { teams.push({ name: document.getElementById('tn'+i).value, color: document.getElementById('tc'+i).value, score: 0 }); }
            document.getElementById('settings-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex';
        }
        function startNewGame() {
            if(teams.length === 0) saveAllSettings();
            if(gameData.length === 0) generateEmptyData();
            used.clear(); teams.forEach(t => t.score = 0);
            document.getElementById('menu-screen').style.display='none'; document.getElementById('game-screen').style.display='flex';
            document.getElementById('snd-intro').pause(); initBoard(); updateSB();
        }
        function openMenu() { document.getElementById('game-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; document.getElementById('cont-btn').style.display='block'; document.getElementById('snd-intro').play().catch(()=>{}); }
        function continueGame() { document.getElementById('menu-screen').style.display='none'; document.getElementById('game-screen').style.display='flex'; }
        function closeQuestion() { document.getElementById('overlay').style.display='none'; document.getElementById('snd-think').pause(); }
        function closeEditor() { document.getElementById('editor-screen').style.display = 'none'; document.getElementById('menu-screen').style.display = 'flex'; }
        function generateTeamInputs() {
            const c = document.getElementById('team-count').value;
            const res = document.getElementById('teams-config-container'); res.innerHTML = '';
            for(let i=1; i<=c; i++) { res.innerHTML += `<div><input type="text" id="tn${i}" value="Команда ${i}"> <input type="color" id="tc${i}" value="${['#28a745','#007bff','#fd7e14','#e83e8c','#6f42c1','#17a2b8'][i-1]}"></div>`; }
        }
        const saved = localStorage.getItem('myTVGameData');
        if(saved) gameData = JSON.parse(saved);
    </script>
</body>
</html>
