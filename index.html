<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СВОЯ ИГРА: INFINITE POINTS</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000833; color: white; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .screen, #overlay { 
            background: radial-gradient(circle at center, #001a66 0%, #000833 100%);
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; 
        }

        .menu-btn { 
            background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%); 
            color: #000; padding: 12px 30px; font-size: 24px; font-weight: bold; 
            border: none; border-radius: 50px; cursor: pointer; margin: 8px; 
            width: 380px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }
        .menu-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px gold; }

        /* Игровое поле */
        #game-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #board { display: grid; gap: 10px; padding: 20px; width: 95%; max-width: 1750px; }
        .cell { background: linear-gradient(145deg, #0606ed, #0000a0); border: 2px solid gold; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; font-size: 2.5vw; }
        .category { background: #0000cd; font-size: 1.3vw; cursor: default; border-color: #4169e1; padding: 10px; text-align: center; }
        .cell.used { background: #000033 !important; color: #000066 !important; border-color: #000044 !important; pointer-events: none; }

        /* РЕДАКТОР */
        .editor-container { background: white; color: black; padding: 25px; border-radius: 15px; width: 95%; max-height: 85vh; overflow-y: auto; text-align: left; }
        .topic-card { border-bottom: 2px solid #000833; padding: 15px; margin-bottom: 10px; background: #f9f9f9; border-radius: 8px; }
        .q-row { display: grid; grid-template-columns: 100px 1fr 1fr 150px; gap: 10px; margin-top: 5px; align-items: center; border-top: 1px solid #ddd; padding-top: 5px; }
        
        input { padding: 6px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
        .input-points { font-weight: bold; color: #b8860b; background: #fffde7; text-align: center; }

        /* Табло */
        .score-board { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; width: 100%; }
        .team-badge { padding: 10px 25px; border-radius: 12px; border: 2px solid white; text-align: center; min-width: 140px; }
        .score-val { font-size: 35px; font-weight: bold; display: block; color: gold; }
    </style>
</head>
<body>

    <audio id="snd-intro" src="intro.mp3" loop></audio>
    <audio id="snd-think" src="think.mp3"></audio>
    <audio id="snd-correct" src="correct.mp3"></audio>
    <audio id="snd-special"></audio>

    <div id="start-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000833; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:gold; font-size:60px;">СВОЯ ИГРА 🔊</h1>
        <button class="menu-btn" onclick="unlockAudio()">АКТИВИРОВАТЬ ЗВУК И ВОЙТИ</button>
    </div>

    <div id="menu-screen" class="screen">
        <h1 style="font-size: 80px; color: gold; margin-bottom: 40px;">МЕНЮ</h1>
        <button class="menu-btn" onclick="continueGame()" id="cont-btn" style="display:none">ПРОДОЛЖИТЬ</button>
        <button class="menu-btn" onclick="showSettings()">НАСТРОЙКИ СЕТКИ</button>
        <button class="menu-btn" onclick="showEditor()">РЕДАКТОР (Вопросы и Баллы) ✏️</button>
        <button class="menu-btn" onclick="startNewGame()">ИГРАТЬ!</button>
    </div>

    <!-- РЕДАКТОР -->
    <div id="editor-screen" class="screen">
        <div class="editor-container">
            <h2>Редактор вопросов и баллов</h2>
            <div id="editor-fields"></div>
            <div style="text-align:center; margin-top:20px;">
                <button class="menu-btn" onclick="saveQuestions()" style="background:green; color:white; width:200px;">СОХРАНИТЬ ВСЁ</button>
                <button class="menu-btn" onclick="closeEditor()" style="background:#555; color:white; width:200px;">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <!-- Настройки сетки -->
    <div id="settings-screen" class="screen">
        <div style="background:rgba(255,255,255,0.1); padding:25px; border-radius:15px; border:1px solid gold;">
            <h2>Размер поля</h2>
            Тем: <input type="number" id="cfg-cats" value="3" min="1" max="10"> 
            Вопросов: <input type="number" id="cfg-qpc" value="5" min="1" max="6">
            <hr>
            <h2>Команды</h2>
            Кол-во: <select id="team-count" onchange="generateTeamInputs()"><option>1</option><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option></select>
            <div id="teams-config-container"></div>
            <button class="menu-btn" onclick="saveAllSettings()" style="background:green; color:white; width:200px; margin-top:20px">ГОТОВО</button>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="game-screen" class="screen" style="background:#000080;">
        <button onclick="openMenu()" style="position:fixed; top:20px; right:20px; padding:15px; background:gold; border:none; font-weight:bold; cursor:pointer; border-radius:10px; z-index:100;">МЕНЮ</button>
        <div id="board"></div>
        <div class="score-board" id="score-board"></div>
    </div>

    <div id="overlay">
        <div id="question-text">Вопрос</div>
        <div id="answer-text">Ответ</div>
        <button id="show-btn" class="menu-btn" onclick="showAnswer()">ОТВЕТ</button>
        <div id="admin-controls" style="display:none; grid-template-columns: repeat(3, 1fr); gap: 15px;"></div>
        <button id="skip-btn" class="menu-btn" style="background:#444; width:280px; display:none; color:white;" onclick="closeQuestion()">Пропустить</button>
    </div>

    <script>
        let config = { cats: 3, qPerCat: 5 };
        let gameData = [];
        let teams = [];
        let used = new Set();
        let curPts = 0;

        function unlockAudio() {
            document.getElementById('start-overlay').style.display='none';
            document.getElementById('menu-screen').style.display='flex';
            document.getElementById('snd-intro').play().catch(()=>{});
        }

        function generateEmptyData() {
            gameData = [];
            for(let r=0; r<config.cats; r++) {
                let row = { cat: "ТЕМА " + (r+1), qs: [] };
                for(let c=0; c<config.qPerCat; c++) { 
                    row.qs.push({ q: "Вопрос", a: "Ответ", p: (c + 1) * 100, snd: "" }); 
                }
                gameData.push(row);
            }
        }

        function showEditor() {
            if(gameData.length === 0) generateEmptyData();
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'flex';
            const f = document.getElementById('editor-fields'); f.innerHTML = '';
            gameData.forEach((row, rIdx) => {
                let h = `<div class="topic-card"><b>Тема:</b> <input type="text" id="ecat-${rIdx}" value="${row.cat}" style="width:250px"><br>`;
                row.qs.forEach((item, cIdx) => {
                    h += `<div class="q-row">
                            <input type="text" id="ep-${rIdx}-${cIdx}" value="${item.p}" class="input-points">
                            <input type="text" id="eq-${rIdx}-${cIdx}" value="${item.q}" placeholder="Вопрос">
                            <input type="text" id="ea-${rIdx}-${cIdx}" value="${item.a}" placeholder="Ответ">
                            <input type="text" id="esnd-${rIdx}-${cIdx}" value="${item.snd || ''}" placeholder="Звук.mp3">
                          </div>`;
                });
                f.innerHTML += h + `</div>`;
            });
        }

        function saveQuestions() {
            gameData.forEach((row, rIdx) => {
                row.cat = document.getElementById(`ecat-${rIdx}`).value;
                row.qs.forEach((item, cIdx) => {
                    item.p = document.getElementById(`ep-${rIdx}-${cIdx}`).value; // Сохраняем как есть (строку или число)
                    item.q = document.getElementById(`eq-${rIdx}-${cIdx}`).value;
                    item.a = document.getElementById(`ea-${rIdx}-${cIdx}`).value;
                    item.snd = document.getElementById(`esnd-${rIdx}-${cIdx}`).value;
                });
            });
            localStorage.setItem('myInfGameData', JSON.stringify(gameData));
            closeEditor();
        }

        function startNewGame() {
            if(teams.length === 0) saveAllSettings();
            used.clear(); teams.forEach(t => t.score = 0);
            document.getElementById('menu-screen').style.display='none';
            document.getElementById('game-screen').style.display='flex';
            document.getElementById('snd-intro').pause();
            initBoard(); updateSB();
        }

        function initBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            b.style.gridTemplateColumns = `240px repeat(${config.qPerCat}, 1fr)`;
            const h = Math.floor(70 / config.cats);
            gameData.forEach((row, rIdx) => {
                const cat = document.createElement('div'); cat.className='cell category'; cat.innerText=row.cat; cat.style.height=h+'vh'; b.appendChild(cat);
                row.qs.forEach((item, cIdx) => {
                    const cell = document.createElement('div'); cell.className='cell'; cell.style.height=h+'vh';
                    cell.innerText = item.p; // Пишем любое значение
                    const id = rIdx+'-'+cIdx; if(used.has(id)) cell.classList.add('used');
                    cell.onclick = () => { if(!cell.classList.contains('used')){ 
                        curPts = isNaN(parseInt(item.p)) ? 0 : parseInt(item.p); // Если ввели текст, зачислится 0
                        used.add(id); cell.classList.add('used'); openQ(item); 
                    }};
                    b.appendChild(cell);
                });
            });
        }

        function openQ(item) {
            document.getElementById('question-text').innerText = item.q;
            document.getElementById('answer-text').innerText = "ОТВЕТ: " + item.a;
            document.getElementById('answer-text').style.display='none';
            document.getElementById('show-btn').style.display='block';
            document.getElementById('admin-controls').style.display='none';
            document.getElementById('skip-btn').style.display='none';
            if(item.snd) { 
                const s = document.getElementById('snd-special'); s.src = item.snd; s.play().catch(()=>{}); 
            } else { 
                document.getElementById('snd-think').play().catch(()=>{}); 
            }
            const ctrl = document.getElementById('admin-controls'); ctrl.innerHTML = '';
            teams.forEach((t, i) => {
                const btn = document.createElement('button'); btn.style.cssText = `background:${t.color}; color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;`;
                btn.innerText = "+ " + t.name;
                btn.onclick = () => { teams[i].score += curPts; document.getElementById('snd-correct').play().catch(()=>{}); updateSB(); closeQuestion(); };
                ctrl.appendChild(btn);
            });
            document.getElementById('overlay').style.display='flex';
        }

        function showAnswer() {
            document.getElementById('answer-text').style.display='block';
            document.getElementById('show-btn').style.display='none';
            document.getElementById('admin-controls').style.display='grid';
            document.getElementById('skip-btn').style.display='block';
            document.getElementById('snd-think').pause(); document.getElementById('snd-think').currentTime=0;
            document.getElementById('snd-special').pause();
        }

        function showSettings() { document.getElementById('menu-screen').style.display='none'; document.getElementById('settings-screen').style.display='flex'; generateTeamInputs(); }
        function saveAllSettings() {
            const nc = parseInt(document.getElementById('cfg-cats').value);
            const nq = parseInt(document.getElementById('cfg-qpc').value);
            if(nc != config.cats || nq != config.qPerCat) { config.cats = nc; config.qPerCat = nq; generateEmptyData(); }
            const tc = document.getElementById('team-count').value;
            teams = []; for(let i=1; i<=tc; i++) { teams.push({ name: document.getElementById('tn'+i).value, color: document.getElementById('tc'+i).value, score: 0 }); }
            document.getElementById('settings-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex';
        }
        function updateSB() { const sb = document.getElementById('score-board'); sb.innerHTML = ''; teams.forEach(t => { sb.innerHTML += `<div class="team-badge" style="background:${t.color}">${t.name}<span class="score-val">${t.score}</span></div>`; }); }
        function openMenu() { document.getElementById('game-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; document.getElementById('cont-btn').style.display='block'; document.getElementById('snd-intro').play().catch(()=>{}); }
        function continueGame() { document.getElementById('menu-screen').style.display='none'; document.getElementById('game-screen').style.display='flex'; }
        function closeQuestion() { document.getElementById('overlay').style.display='none'; document.getElementById('snd-think').pause(); }
        function closeEditor() { document.getElementById('editor-screen').style.display = 'none'; document.getElementById('menu-screen').style.display = 'flex'; }
        function generateTeamInputs() {
            const c = document.getElementById('team-count').value;
            const res = document.getElementById('teams-config-container'); res.innerHTML = '';
            for(let i=1; i<=c; i++) { res.innerHTML += `<div><input type="text" id="tn${i}" value="Команда ${i}"> <input type="color" id="tc${i}" value="${['#28a745','#007bff','#fd7e14','#e83e8c','#6f42c1','#17a2b8'][i-1]}"></div>`; }
        }
        const saved = localStorage.getItem('myInfGameData');
        if(saved) gameData = JSON.parse(saved);
    </script>
</body>
</html>
