<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СВОЯ ИГРА: PC EDITION</title>
    <style>
        /* Базовая адаптация под ПК */
        html, body { height: 100%; margin: 0; padding: 0; background: #000833; color: white; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .screen, #overlay { 
            background: radial-gradient(circle at center, #001a66 0%, #000833 100%);
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; 
        }

        /* КНОПКИ: компактный размер для мыши */
        .menu-btn { 
            background: gold; color: #000; padding: 12px 30px; font-size: 18px; font-weight: 800; 
            border: none; border-radius: 8px; cursor: pointer; margin: 8px; 
            width: 100%; max-width: 320px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.4); 
            text-transform: uppercase;
        }
        .menu-btn:hover { transform: scale(1.03); background: #fff; box-shadow: 0 0 15px gold; }

        /* Игровое поле: центрировано и ограничено по ширине */
        #game-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        #board { 
            display: grid; gap: 8px; padding: 20px; 
            width: 95%; max-width: 1200px; /* Чтобы не растягивалось на весь монитор */
            margin: 0 auto;
        }
        
        .cell { 
            background: linear-gradient(145deg, #0606ed, #0000a0); 
            border: 2px solid gold; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; cursor: pointer; 
            transition: 0.2s; text-align: center; font-size: 32px; min-height: 70px;
        }
        .category { 
            background: #0000cd; font-size: 16px; cursor: default; 
            border-color: #4169e1; padding: 10px; text-transform: uppercase; 
            line-height: 1.2;
        }
        .cell.used { background: #000022 !important; color: #000066 !important; border-color: #111 !important; pointer-events: none; }

        /* ОКНО ВОПРОСА: читабельный размер на мониторе */
        #question-text { 
            font-size: 36px; font-weight: 600; text-align: center; 
            margin-bottom: 30px; max-width: 850px; line-height: 1.3;
            text-shadow: 2px 2px 10px black;
        }
        #answer-text { 
            font-size: 32px; color: gold; margin-bottom: 30px; 
            display: none; font-weight: 800; border-top: 3px solid gold; 
            padding-top: 15px; text-transform: uppercase;
        }

        /* Табло очков: компактнее */
        .score-board { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .team-badge { padding: 10px 20px; border-radius: 12px; border: 2px solid white; text-align: center; min-width: 150px; background: rgba(0,0,0,0.2); }
        .score-name { font-size: 14px; font-weight: bold; opacity: 0.8; }
        .score-val { font-size: 36px; font-weight: 900; color: gold; }

        /* Редактор */
        .editor-container { background: white; color: black; padding: 25px; border-radius: 15px; width: 90%; max-width: 1100px; max-height: 85vh; overflow-y: auto; }
        .editor-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; margin-bottom: 10px; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 5px;}
        input { padding: 8px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box;}
    </style>
</head>
<body>

    <audio id="snd-intro" src="intro.mp3" loop></audio>
    <audio id="snd-think" src="think.mp3"></audio>
    <audio id="snd-correct" src="correct.mp3"></audio>

    <!-- Стартовый экран -->
    <div id="start-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000833; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:gold; font-size:60px; text-shadow: 0 0 20px gold; margin-bottom:40px;">СВОЯ ИГРА</h1>
        <button class="menu-btn" onclick="unlockAudio()">ВОЙТИ В ИГРУ</button>
    </div>

    <!-- МЕНЮ -->
    <div id="menu-screen" class="screen">
        <button class="menu-btn" onclick="continueGame()" id="cont-btn" style="display:none">ПРОДОЛЖИТЬ</button>
        <button class="menu-btn" onclick="showSettings()">НАСТРОЙКИ</button>
        <button class="menu-btn" onclick="showEditor()">РЕДАКТОР ВОПРОСОВ</button>
        <button class="menu-btn" onclick="startNewGame()" style="background:#2ecc71; color:white;">НАЧАТЬ НОВУЮ ИГРУ</button>
    </div>

    <!-- ИГРА -->
    <div id="game-screen" class="screen">
        <button onclick="openMenu()" style="position:fixed; top:20px; right:20px; padding:10px 20px; background:gold; border:none; font-weight:bold; cursor:pointer; border-radius:8px; z-index:100;">МЕНЮ</button>
        <div id="board"></div>
        <div class="score-board" id="score-board"></div>
    </div>

    <!-- ОКНО ВОПРОСА -->
    <div id="overlay">
        <div id="question-text">Текст вопроса</div>
        <div id="answer-text">ОТВЕТ</div>
        <button id="show-btn" class="menu-btn" onclick="showAnswer()">ПОКАЗАТЬ ОТВЕТ</button>
        <div id="admin-controls" style="display:none; justify-content:center; gap: 15px; margin-top:20px; flex-wrap:wrap;"></div>
        <button id="skip-btn" class="menu-btn" style="background:#444; color:white; font-size: 16px; margin-top:20px;" onclick="closeQuestion()">Никто не ответил</button>
    </div>

    <!-- Настройки -->
    <div id="settings-screen" class="screen">
        <div style="background:rgba(255,255,255,0.1); padding:30px; border-radius:20px; border:2px solid gold; width: 400px; text-align: center;">
            <h2 style="color:gold">ПАРАМЕТРЫ</h2>
            Темы: <input type="number" id="cfg-cats" value="3" style="width:60px"> <br><br>
            Вопросы: <input type="number" id="cfg-qpc" value="5" style="width:60px">
            <hr>
            Команды: <select id="team-count" onchange="generateTeamInputs()" style="padding:5px;"><option>1</option><option>2</option><option>3</option><option selected>4</option><option>5</option></select>
            <div id="teams-config-container" style="margin-top:15px"></div>
            <button class="menu-btn" onclick="saveAllSettings()" style="background:green; color:white; margin-top:20px">ГОТОВО</button>
        </div>
    </div>

    <!-- Редактор -->
    <div id="editor-screen" class="screen">
        <div class="editor-container">
            <h2 style="margin-top:0">Редактор вопросов и тем</h2>
            <div id="editor-fields"></div>
            <div style="text-align:center; margin-top:20px;">
                <button class="menu-btn" onclick="saveQuestions()" style="background:green; color:white;">СОХРАНИТЬ</button>
                <button class="menu-btn" onclick="closeEditor()" style="background:#555; color:white;">ОТМЕНА</button>
            </div>
        </div>
    </div>

    <script>
        let config = { cats: 3, qPerCat: 5 };
        let gameData = [];
        let teams = [];
        let used = new Set();
        let curPts = 0;

        function unlockAudio() {
            document.getElementById('start-overlay').style.display='none';
            document.getElementById('menu-screen').style.display='flex';
            const intro = document.getElementById('snd-intro');
            intro.volume = 0.3;
            intro.play().catch(()=>{});
        }

        function generateEmptyData() {
            gameData = [];
            for(let r=0; r<config.cats; r++) {
                let row = { cat: "ТЕМА " + (r+1), qs: [] };
                for(let c=0; c<config.qPerCat; c++) { 
                    row.qs.push({ q: "Текст вопроса для темы " + (r+1), a: "Правильный ответ", p: (c + 1) * 100 }); 
                }
                gameData.push(row);
            }
        }

        function showEditor() {
            if(gameData.length === 0) generateEmptyData();
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('editor-screen').style.display = 'flex';
            
            let container = document.getElementById('editor-fields');
            container.innerHTML = "";
            gameData.forEach((cat, cIdx) => {
                let section = document.createElement('div');
                section.style.marginBottom = "30px";
                section.innerHTML = `<h3>Тема ${cIdx+1}: <input style="width:200px" value="${cat.cat}" onchange="gameData[${cIdx}].cat=this.value"></h3>`;
                cat.qs.forEach((q, qIdx) => {
                    section.innerHTML += `
                        <div class="editor-row">
                            <span>Вопрос ${q.p}:</span>
                            <input value="${q.q}" onchange="gameData[${cIdx}].qs[${qIdx}].q=this.value">
                            <input placeholder="Ответ" value="${q.a}" onchange="gameData[${cIdx}].qs[${qIdx}].a=this.value">
                        </div>`;
                });
                container.appendChild(section);
            });
        }

        function saveQuestions() { closeEditor(); }
        function closeEditor() { document.getElementById('editor-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; }

        function showSettings() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('settings-screen').style.display = 'flex';
            generateTeamInputs();
        }

        function generateTeamInputs() {
            let count = document.getElementById('team-count').value;
            let container = document.getElementById('teams-config-container');
            container.innerHTML = "";
            for(let i=0; i<count; i++) {
                container.innerHTML += `<input type="text" id="tname-${i}" value="КОМАНДА ${i+1}" style="margin-bottom:5px"><br>`;
            }
        }

        function saveAllSettings() {
            config.cats = parseInt(document.getElementById('cfg-cats').value);
            config.qPerCat = parseInt(document.getElementById('cfg-qpc').value);
            let tCount = document.getElementById('team-count').value;
            teams = [];
            for(let i=0; i<tCount; i++) {
                teams.push({ name: document.getElementById('tname-'+i).value, score: 0 });
            }
            generateEmptyData();
            document.getElementById('settings-screen').style.display='none';
            document.getElementById('menu-screen').style.display='flex';
        }

        function startNewGame() {
            if(teams.length === 0) saveAllSettings();
            used.clear();
            document.getElementById('menu-screen').style.display='none';
            document.getElementById('game-screen').style.display='flex';
            renderBoard();
            updateScores();
        }

        function renderBoard() {
            let board = document.getElementById('board');
            board.style.gridTemplateColumns = `250px repeat(${config.qPerCat}, 1fr)`;
            board.innerHTML = "";
            gameData.forEach((cat, rIdx) => {
                let catCell = document.createElement('div');
                catCell.className = "cell category";
                catCell.innerText = cat.cat;
                board.appendChild(catCell);
                cat.qs.forEach((q, cIdx) => {
                    let qCell = document.createElement('div');
                    qCell.className = "cell";
                    let qId = rIdx + "-" + cIdx;
                    if(used.has(qId)) qCell.classList.add('used');
                    qCell.innerText = q.p;
                    qCell.onclick = () => openQuestion(rIdx, cIdx);
                    board.appendChild(qCell);
                });
            });
        }

        function openQuestion(r, c) {
            let q = gameData[r].qs[c];
            curPts = q.p;
            used.add(r + "-" + c);
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('answer-text').innerText = q.a;
            document.getElementById('answer-text').style.display = 'none';
            document.getElementById('show-btn').style.display = 'block';
            document.getElementById('admin-controls').style.display = 'none';
            document.getElementById('skip-btn').style.display = 'none';
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('snd-think').play();
        }

        function showAnswer() {
            document.getElementById('answer-text').style.display = 'block';
            document.getElementById('show-btn').style.display = 'none';
            document.getElementById('skip-btn').style.display = 'block';
            let controls = document.getElementById('admin-controls');
            controls.innerHTML = "";
            controls.style.display = 'flex';
            teams.forEach((t, i) => {
                let btn = document.createElement('button');
                btn.className = "menu-btn";
                btn.style.width = "180px";
                btn.innerText = t.name + " (+)";
                btn.onclick = () => addScore(i);
                controls.appendChild(btn);
            });
        }

        function addScore(idx) {
            teams[idx].score += curPts;
            closeQuestion();
        }

        function closeQuestion() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('snd-think').pause();
            document.getElementById('snd-think').currentTime = 0;
            updateScores();
            renderBoard();
        }

        function updateScores() {
            let container = document.getElementById('score-board');
            container.innerHTML = "";
            teams.forEach(t => {
                container.innerHTML += `
                    <div class="team-badge">
                        <span class="score-name">${t.name}</span>
                        <span class="score-val">${t.score}</span>
                    </div>`;
            });
        }

        function openMenu() { document.getElementById('game-screen').style.display='none'; document.getElementById('menu-screen').style.display='flex'; document.getElementById('cont-btn').style.display='block'; }
        function continueGame() { document.getElementById('menu-screen').style.display='none'; document.getElementById('game-screen').style.display='flex'; }
    </script>
</body>
</html>
